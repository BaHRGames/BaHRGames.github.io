<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Telegram Tik · GameJolt Cloud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Telegram Theme Variables — полная адаптация */
        :root {
            --tg-bg-color: var(--tg-theme-bg-color, #000000);
            --tg-text-color: var(--tg-theme-text-color, #ffffff);
            --tg-hint-color: var(--tg-theme-hint-color, #aaaaaa);
            --tg-link-color: var(--tg-theme-link-color, #6c9ee7);
            --tg-button-color: var(--tg-theme-button-color, #3f8ef0);
            --tg-button-text-color: var(--tg-theme-button-text-color, #ffffff);
            --tg-secondary-bg-color: var(--tg-theme-secondary-bg-color, #1f1f1f);
            --tg-header-bg-color: var(--tg-theme-header-bg-color, #000000);
            --tg-accent-text-color: var(--tg-theme-accent-text-color, #3f8ef0);
            --tg-section-separator-color: var(--tg-theme-section-separator-color, #2c2c2c);
            --tg-destructive-text-color: var(--tg-theme-destructive-text-color, #ff5c5c);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--tg-bg-color);
            color: var(--tg-text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: pan-y;
        }

        .tiktok-app {
            width: 100vw;
            height: 100vh;
            background-color: var(--tg-bg-color);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background-color: var(--tg-header-bg-color);
            border-bottom: 1px solid var(--tg-section-separator-color);
            z-index: 20;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            gap: 24px;
            font-weight: 600;
            font-size: 18px;
        }

        .tab {
            opacity: 0.6;
            transition: 0.2s;
            cursor: pointer;
            padding-bottom: 4px;
            color: var(--tg-text-color);
        }

        .tab.active {
            opacity: 1;
            font-weight: 600;
            border-bottom: 2px solid var(--tg-button-color);
        }

        .header-right {
            display: flex;
            gap: 20px;
            font-size: 20px;
            color: var(--tg-hint-color);
        }

        .header-right i {
            cursor: pointer;
            transition: 0.2s;
        }

        .pages-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .page {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
            scroll-behavior: smooth;
        }

        .page.active {
            display: block;
        }

        .feed-container {
            height: 100%;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            -ms-overflow-style: none;
            scrollbar-width: none;
            background-color: var(--tg-bg-color);
        }

        .feed-container::-webkit-scrollbar {
            display: none;
        }

        .video-card {
            height: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 16px;
            color: white;
            background: #000;
            overflow: hidden;
        }

        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: auto;
            z-index: 0;
        }

        .video-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(0deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2) 100%);
            pointer-events: none;
            z-index: 1;
        }

        .video-info {
            position: relative;
            z-index: 2;
            max-width: 70%;
            pointer-events: none;
            margin-bottom: 40px;
        }

        .user-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            pointer-events: auto;
            cursor: pointer;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid var(--tg-button-color);
            object-fit: cover;
            background: var(--tg-secondary-bg-color);
        }

        .username {
            font-weight: 700;
            font-size: 16px;
            text-shadow: 0 1px 2px black;
        }

        .verified {
            color: var(--tg-button-color);
            font-size: 14px;
        }

        .caption {
            font-size: 14px;
            line-height: 1.3;
            margin-bottom: 8px;
            text-shadow: 0 1px 2px black;
        }

        .music-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            opacity: 0.9;
        }

        .action-bar {
            position: absolute;
            right: 16px;
            bottom: 100px;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            pointer-events: auto;
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .action-item i {
            font-size: 32px;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
            cursor: pointer;
            transition: 0.1s;
        }

        .action-item i:active {
            transform: scale(1.15);
        }

        .action-item .count {
            font-size: 12px;
            font-weight: 600;
            text-shadow: 0 1px 3px black;
        }

        .action-item .fa-heart.liked {
            font-weight: 900;
            color: var(--tg-destructive-text-color);
        }

        .action-item .fa-bookmark.saved {
            font-weight: 900;
            color: #ffc107;
        }

        .heart-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            color: var(--tg-destructive-text-color);
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }

        .heart-overlay.show {
            animation: heartPop 0.5s ease;
        }

        @keyframes heartPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
        }

        .loading-spinner {
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--tg-hint-color);
            font-size: 14px;
            gap: 8px;
            background: var(--tg-bg-color);
            scroll-snap-align: start;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid var(--tg-section-separator-color);
            border-top: 3px solid var(--tg-button-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 16px 14px;
            background-color: var(--tg-header-bg-color);
            border-top: 1px solid var(--tg-section-separator-color);
            flex-shrink: 0;
            z-index: 20;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
            color: var(--tg-hint-color);
            transition: 0.2s;
            cursor: pointer;
        }

        .nav-item i {
            font-size: 22px;
            margin-bottom: 2px;
        }

        .nav-item.active {
            color: var(--tg-button-color);
        }

        .nav-item .label {
            font-size: 11px;
            font-weight: 500;
        }

        .plus-button {
            background-color: var(--tg-button-color);
            color: var(--tg-button-text-color);
            width: 44px;
            height: 30px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
        }

        .live-badge {
            background: var(--tg-destructive-text-color);
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 9px;
            font-weight: bold;
            margin-left: 6px;
        }

        .profile-header {
            padding: 20px 16px;
            background: var(--tg-secondary-bg-color);
            display: flex;
            flex-direction: column;
            gap: 16px;
            border-bottom: 1px solid var(--tg-section-separator-color);
        }

        .profile-top {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--tg-button-color);
            object-fit: cover;
        }

        .profile-stats {
            display: flex;
            gap: 28px;
            flex: 1;
            justify-content: center;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 20px;
            font-weight: 700;
            color: var(--tg-text-color);
        }

        .stat-label {
            font-size: 12px;
            color: var(--tg-hint-color);
        }

        .profile-bio {
            font-size: 14px;
            color: var(--tg-text-color);
        }

        .follow-btn {
            background: var(--tg-button-color);
            border: none;
            border-radius: 30px;
            padding: 12px;
            color: var(--tg-button-text-color);
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .follow-btn.following {
            background: var(--tg-secondary-bg-color);
            color: var(--tg-text-color);
            border: 1px solid var(--tg-section-separator-color);
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            background: var(--tg-bg-color);
        }

        .grid-video {
            aspect-ratio: 9/16;
            background: var(--tg-secondary-bg-color);
            object-fit: cover;
            width: 100%;
            cursor: pointer;
        }

        .upload-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .upload-area {
            border: 2px dashed var(--tg-section-separator-color);
            border-radius: 28px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            background: var(--tg-secondary-bg-color);
        }

        .upload-area i {
            font-size: 48px;
            color: var(--tg-hint-color);
        }

        .upload-input {
            background: var(--tg-secondary-bg-color);
            border: 1px solid var(--tg-section-separator-color);
            border-radius: 16px;
            padding: 14px;
            color: var(--tg-text-color);
            font-size: 16px;
        }

        .comment-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .comment-modal.show {
            visibility: visible;
            opacity: 1;
        }

        .comment-sheet {
            background: var(--tg-secondary-bg-color);
            width: 100%;
            border-top-left-radius: 28px;
            border-top-right-radius: 28px;
            padding: 20px;
            color: var(--tg-text-color);
            transform: translateY(100%);
            transition: 0.2s;
            max-height: 65%;
            overflow-y: auto;
        }

        .comment-modal.show .comment-sheet {
            transform: translateY(0);
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-comments {
            font-size: 28px;
            cursor: pointer;
            color: var(--tg-hint-color);
        }

        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }

        .comment-item {
            display: flex;
            gap: 12px;
        }

        .comment-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--tg-button-color);
            flex-shrink: 0;
        }

        .comment-name {
            font-weight: 600;
            font-size: 14px;
        }

        .comment-text {
            font-size: 14px;
            color: var(--tg-hint-color);
        }

        .comment-input-area {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .comment-input {
            flex: 1;
            background: var(--tg-bg-color);
            border: 1px solid var(--tg-section-separator-color);
            border-radius: 28px;
            padding: 12px 18px;
            color: var(--tg-text-color);
            font-size: 14px;
        }

        .comment-send {
            background: var(--tg-button-color);
            border: none;
            border-radius: 28px;
            padding: 0 20px;
            color: var(--tg-button-text-color);
            font-weight: 600;
            cursor: pointer;
        }

        .upload-status {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--tg-secondary-bg-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 200;
            display: none;
            border: 1px solid var(--tg-button-color);
        }
    </style>
</head>
<body>
    <div class="tiktok-app">
        <div class="header">
            <div class="header-left">
                <span class="tab active" data-tab="home">Для вас</span>
                <span class="tab" data-tab="friends">Подписки</span>
            </div>
            <div class="header-right">
                <i class="fa-solid fa-magnifying-glass"></i>
                <i class="fa-regular fa-circle-check"></i>
            </div>
        </div>

        <div class="pages-container">
            <div class="page active" id="page-feed">
                <div class="feed-container" id="feedContainer"></div>
            </div>
            <div class="page" id="page-profile">
                <div id="profileContent"></div>
            </div>
            <div class="page" id="page-upload">
                <div class="upload-container">
                    <h2>Новое видео</h2>
                    <div class="upload-area" id="uploadArea">
                        <i class="fa-solid fa-cloud-upload-alt"></i>
                        <p>Выберите видео</p>
                    </div>
                    <input type="file" id="videoFile" accept="video/*">
                    <input type="text" class="upload-input" id="videoCaption" placeholder="Описание...">
                    <input type="text" class="upload-input" id="videoMusic" placeholder="Музыка">
                    <button class="follow-btn" id="publishBtn">Опубликовать</button>
                </div>
            </div>
            <div class="page" id="page-discover">
                <div style="padding:20px;color:var(--tg-hint-color);text-align:center;">Рекомендации</div>
            </div>
            <div class="page" id="page-inbox">
                <div style="padding:20px;color:var(--tg-hint-color);text-align:center;">Уведомления</div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" data-page="feed"><i class="fa-solid fa-house"></i><span class="label">Главная</span></div>
            <div class="nav-item" data-page="discover"><i class="fa-solid fa-compass"></i><span class="label">Открыть</span></div>
            <div class="nav-item plus-button" data-page="upload"><i class="fa-solid fa-plus"></i></div>
            <div class="nav-item" data-page="inbox"><i class="fa-regular fa-envelope"></i><span class="label">Сообщения</span></div>
            <div class="nav-item" data-page="profile" id="navProfile"><i class="fa-regular fa-user"></i><span class="label">Профиль</span></div>
        </div>
    </div>

    <div class="comment-modal" id="commentModal">
        <div class="comment-sheet">
            <div class="comment-header">
                <h3>Комментарии (<span id="commentCountSpan">0</span>)</h3>
                <span class="close-comments" id="closeComments">&times;</span>
            </div>
            <div class="comment-list" id="commentList"></div>
            <div class="comment-input-area">
                <input type="text" class="comment-input" placeholder="Написать комментарий..." id="commentInput">
                <button class="comment-send" id="sendComment">→</button>
            </div>
        </div>
    </div>

    <div class="upload-status" id="uploadStatus">Загрузка...</div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

                    c = ii(c, d, a, b, k[14], 15, -1416354905);
                    b = ii(b, c, d, a, k[5], 21, -57434055);
                    a = ii(a, b, c, d, k[12], 6, 1700485571);
                    d = ii(d, a, b, c, k[3], 10, -1894986606);
                    c = ii(c, d, a, b, k[10], 15, -1051523);
                    b = ii(b, c, d, a, k[1], 21, -2054922799);
                    a = ii(a, b, c, d, k[8], 6, 1873313359);
                    d = ii(d, a, b, c, k[15], 10, -30611744);
                    c = ii(c, d, a, b, k[6], 15, -1560198380);
                    b = ii(b, c, d, a, k[13], 21, 1309151649);
                    a = ii(a, b, c, d, k[4], 6, -145523070);
                    d = ii(d, a, b, c, k[11], 10, -1120210379);
                    c = ii(c, d, a, b, k[2], 15, 718787259);
                    b = ii(b, c, d, a, k[9], 21, -343485551);
                    x[0] = add32(a, x[0]);
                    x[1] = add32(b, x[1]);
                    x[2] = add32(c, x[2]);
                    x[3] = add32(d, x[3]);
                }
                function cmn(q, a, b, x, s, t) { return add32(rol(add32(add32(a, q), add32(x, t)), s), b); }
                function ff(a, b, c, d, x, s, t) { return cmn((b & c) | ((~b) & d), a, b, x, s, t); }
                function gg(a, b, c, d, x, s, t) { return cmn((b & d) | (c & (~d)), a, b, x, s, t); }
                function hh(a, b, c, d, x, s, t) { return cmn(b ^ c ^ d, a, b, x, s, t); }
                function ii(a, b, c, d, x, s, t) { return cmn(c ^ (b | (~d)), a, b, x, s, t); }
                function rol(num, cnt) { return (num << cnt) | (num >>> (32 - cnt)); }
                function add32(a, b) { return (a + b) & 0xFFFFFFFF; }
                function str2binl(str) {
                    var bin = [], mask = (1 << 8) - 1;
                    for (var i = 0; i < str.length * 8; i += 8)
                        bin[i >> 5] |= (str.charCodeAt(i / 8) & mask) << (i % 32);
                    return bin;
                }
                function binl2hex(binarray) {
                    var hex_tab = '0123456789abcdef', str = '';
                    for (var i = 0; i < binarray.length * 4; i++) {
                        str += hex_tab.charAt((binarray[i >> 2] >> ((i % 4) * 8 + 4)) & 0xF) +
                               hex_tab.charAt((binarray[i >> 2] >> ((i % 4) * 8)) & 0xF);
                    }
                    return str;
                }
                var x = str2binl(string);
                var len = string.length * 8;
                x[len >> 5] |= 0x80 << (len % 32);
                x[(((len + 64) >>> 9) << 4) + 14] = len;
                md5cycle(x, x);
                return binl2hex(x);
            }

            // GameJolt API helper
            function gjRequest(endpoint, params, useAuth = false) {
                return new Promise((resolve, reject) => {
                    let url = `${GJ_CONFIG.apiUrl}${endpoint}?game_id=${GJ_CONFIG.gameId}&format=json`;
                    for (let key in params) {
                        url += `&${key}=${encodeURIComponent(params[key])}`;
                    }
                    if (useAuth && currentUser && currentUser.username && currentUser.token) {
                        url += `&username=${encodeURIComponent(currentUser.username)}&user_token=${encodeURIComponent(currentUser.token)}`;
                    }
                    const signature = md5(url + GJ_CONFIG.privateKey);
                    url += `&signature=${signature}`;
                    
                    fetch(url).then(res => res.json()).then(data => {
                        if (data.response && data.response.success === 'true') {
                            resolve(data.response);
                        } else {
                            reject(data.response || { message: 'Unknown error' });
                        }
                    }).catch(reject);
                });
            }

            // Data Store helpers
            async function dataStoreSet(key, value, isUserStore = true) {
                return gjRequest('/data-store/set/', { key: key, data: JSON.stringify(value) }, isUserStore);
            }
            async function dataStoreGet(key, isUserStore = true) {
                try {
                    const res = await gjRequest('/data-store/', { key: key }, isUserStore);
                    return res.data ? JSON.parse(res.data) : null;
                } catch(e) { return null; }
            }
            async function dataStoreRemove(key, isUserStore = true) {
                return gjRequest('/data-store/remove/', { key: key }, isUserStore);
            }

            // ==================== YEETYOURFILES INTEGRATION ====================
            const YYF_URL = 'https://yyf.mubilop.com';
            
            async function uploadToYYF(fileBlob, fileName) {
                const formData = new FormData();
                formData.append('file', fileBlob, fileName);
                const response = await fetch(`${YYF_URL}/api/upload`, { method: 'POST', body: formData });
                if (!response.ok) throw new Error('Upload failed');
                const result = await response.json();
                return {
                    fileId: result.fileId,
                    fileUrl: YYF_URL + result.fileUrl,
                    shortHash: result.shortHash
                };
            }

            // ==================== CURRENT USER ====================
            const tgUser = tg.initDataUnsafe?.user;
            let currentUser = {
                id: tgUser?.id?.toString() || 'user_' + Date.now(),
                username: tgUser?.username || tgUser?.first_name || 'telegram_user',
                avatar: `https://avatars.dicebear.com/api/avataaars/${tgUser?.id || 'default'}.svg`,
                token: null,
                followers: 0,
                following: 0,
                bio: 'TikTok on Telegram'
            };
            
            // Generate token or use existing
            async function initUser() {
                let stored = await dataStoreGet(`user_${currentUser.id}`, false);
                if (stored && stored.token) {
                    currentUser.token = stored.token;
                    currentUser.followers = stored.followers || 0;
                    currentUser.following = stored.following || 0;
                    currentUser.bio = stored.bio || currentUser.bio;
                } else {
                    currentUser.token = md5(currentUser.id + GJ_CONFIG.privateKey + Date.now()).substring(0, 32);
                    await dataStoreSet(`user_${currentUser.id}`, {
                        id: currentUser.id,
                        username: currentUser.username,
                        token: currentUser.token,
                        followers: 0,
                        following: 0,
                        bio: currentUser.bio,
                        avatar: currentUser.avatar
                    }, false);
                }
            }

            // ==================== VIDEO STORAGE ====================
            let videosCache = [];
            
            async function loadAllVideos() {
                const videosData = await dataStoreGet('global_videos', false);
                if (videosData && videosData.videos) {
                    videosCache = videosData.videos;
                } else {
                    videosCache = [];
                }
                return videosCache;
            }
            
            async function saveVideo(video) {
                videosCache.unshift(video);
                await dataStoreSet('global_videos', { videos: videosCache }, false);
            }
            
            async function updateVideo(videoId, updates) {
                const index = videosCache.findIndex(v => v.id === videoId);
                if (index !== -1) {
                    videosCache[index] = { ...videosCache[index], ...updates };
                    await dataStoreSet('global_videos', { videos: videosCache }, false);
                }
            }
            
            async function addComment(videoId, userId, username, text) {
                const video = videosCache.find(v => v.id === videoId);
                if (video) {
                    if (!video.commentsList) video.commentsList = [];
                    video.commentsList.push({ userId, username, text, timestamp: Date.now() });
                    video.comments = video.commentsList.length;
                    await updateVideo(videoId, { comments: video.comments, commentsList: video.commentsList });
                }
            }
            
            async function likeVideo(videoId, userId) {
                const video = videosCache.find(v => v.id === videoId);
                if (video) {
                    if (!video.likesList) video.likesList = [];
                    if (!video.likesList.includes(userId)) {
                        video.likesList.push(userId);
                        video.likes = video.likesList.length;
                        await updateVideo(videoId, { likes: video.likes, likesList: video.likesList });
                        return true;
                    }
                }
                return false;
            }
            
            async function unlikeVideo(videoId, userId) {
                const video = videosCache.find(v => v.id === videoId);
                if (video && video.likesList) {
                    const index = video.likesList.indexOf(userId);
                    if (index !== -1) {
                        video.likesList.splice(index, 1);
                        video.likes = video.likesList.length;
                        await updateVideo(videoId, { likes: video.likes, likesList: video.likesList });
                        return true;
                    }
                }
                return false;
            }
            
            async function saveVideoToUser(videoId, userId) {
                const userData = await dataStoreGet(`user_${userId}`, false);
                if (userData) {
                    if (!userData.savedVideos) userData.savedVideos = [];
                    if (!userData.savedVideos.includes(videoId)) {
                        userData.savedVideos.push(videoId);
                        await dataStoreSet(`user_${userId}`, userData, false);
                        return true;
                    }
                }
                return false;
            }
            
            async function unsaveVideo(videoId, userId) {
                const userData = await dataStoreGet(`user_${userId}`, false);
                if (userData && userData.savedVideos) {
                    const index = userData.savedVideos.indexOf(videoId);
                    if (index !== -1) {
                        userData.savedVideos.splice(index, 1);
                        await dataStoreSet(`user_${userId}`, userData, false);
                        return true;
                    }
                }
                return false;
            }
            
            async function isVideoLiked(videoId, userId) {
                const video = videosCache.find(v => v.id === videoId);
                return video?.likesList?.includes(userId) || false;
            }
            
            async function isVideoSaved(videoId, userId) {
                const userData = await dataStoreGet(`user_${userId}`, false);
                return userData?.savedVideos?.includes(videoId) || false;
            }

            // ==================== UI RENDERING ====================
            function formatCount(num) {
                if (num >= 1000000) return (num/1000000).toFixed(1)+'M';
                if (num >= 1000) return (num/1000).toFixed(1)+'K';
                return num.toString();
            }
            
            async function createVideoCard(video) {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.dataset.videoId = video.id;
                
                const isLiked = await isVideoLiked(video.id, currentUser.id);
                const isSaved = await isVideoSaved(video.id, currentUser.id);
                
                card.innerHTML = `
                    <video class="bg-video" src="${video.url}" loop playsinline></video>
                    <div class="heart-overlay"><i class="fa-solid fa-heart"></i></div>
                    <div class="video-info">
                        <div class="user-row" data-userid="${video.userId}">
                            <img class="avatar" src="${video.userAvatar || 'https://avatars.dicebear.com/api/avataaars/default.svg'}">
                            <span class="username">${video.username}</span>
                            <span class="live-badge">LIVE</span>
                        </div>
                        <div class="caption">${video.caption}</div>
                        <div class="music-row">
                            <div class="music-icon"><i class="fa-solid fa-music"></i></div>
                            <span>${video.music}</span>
                        </div>
                    </div>
                    <div class="action-bar">
                        <div class="action-item like-item">
                            <i class="fa-${isLiked ? 'solid' : 'regular'} fa-heart ${isLiked ? 'liked' : ''}" data-action="like"></i>
                            <span class="count like-count">${formatCount(video.likes)}</span>
                        </div>
                        <div class="action-item comment-item">
                            <i class="fa-regular fa-comment" data-action="comment"></i>
                            <span class="count comment-count">${formatCount(video.comments)}</span>
                        </div>
                        <div class="action-item save-item">
                            <i class="fa-${isSaved ? 'solid' : 'regular'} fa-bookmark ${isSaved ? 'saved' : ''}" data-action="save"></i>
                            <span class="count save-count">${formatCount(video.saves || 0)}</span>
                        </div>
                        <div class="action-item share-item">
                            <i class="fa-solid fa-share" data-action="share"></i>
                            <span class="count">12K</span>
                        </div>
                    </div>
                `;
                
                const videoEl = card.querySelector('.bg-video');
                videoEl.volume = 1.0;
                videoEl.muted = false;
                
                videoEl.addEventListener('dblclick', async (e) => {
                    e.stopPropagation();
                    const liked = await isVideoLiked(video.id, currentUser.id);
                    if (liked) {
                        await unlikeVideo(video.id, currentUser.id);
                    } else {
                        await likeVideo(video.id, currentUser.id);
                    }
                    const newLiked = await isVideoLiked(video.id, currentUser.id);
                    const likeIcon = card.querySelector('[data-action="like"]');
                    const likeCountSpan = card.querySelector('.like-count');
                    likeIcon.className = `fa-${newLiked ? 'solid' : 'regular'} fa-heart ${newLiked ? 'liked' : ''}`;
                    likeCountSpan.innerText = formatCount(video.likes);
                    if (!newLiked) {
                        const heartOverlay = card.querySelector('.heart-overlay');
                        heartOverlay.classList.remove('show');
                        void heartOverlay.offsetWidth;
                        heartOverlay.classList.add('show');
                    }
                    tg.HapticFeedback.impactOccurred('light');
                });
                
                card.querySelector('[data-action="like"]').addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const liked = await isVideoLiked(video.id, currentUser.id);
                    if (liked) {
                        await unlikeVideo(video.id, currentUser.id);
                    } else {
                        await likeVideo(video.id, currentUser.id);
                    }
                    const newLiked = await isVideoLiked(video.id, currentUser.id);
                    const likeIcon = card.querySelector('[data-action="like"]');
                    const likeCountSpan = card.querySelector('.like-count');
                    likeIcon.className = `fa-${newLiked ? 'solid' : 'regular'} fa-heart ${newLiked ? 'liked' : ''}`;
                    likeCountSpan.innerText = formatCount(video.likes);
                    tg.HapticFeedback.impactOccurred('light');
                });
                
                card.querySelector('[data-action="save"]').addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const saved = await isVideoSaved(video.id, currentUser.id);
                    if (saved) {
                        await unsaveVideo(video.id, currentUser.id);
                    } else {
                        await saveVideoToUser(video.id, currentUser.id);
                    }
                    const newSaved = await isVideoSaved(video.id, currentUser.id);
                    const saveIcon = card.querySelector('[data-action="save"]');
                    saveIcon.className = `fa-${newSaved ? 'solid' : 'regular'} fa-bookmark ${newSaved ? 'saved' : ''}`;
                    tg.HapticFeedback.impactOccurred('light');
                });
                
                card.querySelector('[data-action="comment"]').addEventListener('click', () => openCommentsForVideo(video.id));
                card.querySelector('[data-action="share"]').addEventListener('click', () => tg.showAlert(`Поделиться: ${video.url}`));
                card.querySelector('.user-row').addEventListener('click', () => {
                    renderProfile(video.userId);
                    showPage('profile');
                });
                
                return card;
            }
            
            let feedContainer = document.getElementById('feedContainer');
            
            async function renderFeed() {
                feedContainer.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><span>Загрузка...</span></div>';
                await loadAllVideos();
                feedContainer.innerHTML = '';
                for (let video of videosCache.slice().reverse()) {
                    feedContainer.appendChild(await createVideoCard(video));
                }
                const spinner = document.createElement('div');
                spinner.className = 'loading-spinner';
                spinner.innerHTML = '<div class="spinner"></div><span>Загружаем ещё...</span>';
                feedContainer.appendChild(spinner);
                setupVideoAutoplay();
            }
            
            function setupVideoAutoplay() {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const video = entry.target.querySelector('.bg-video');
                        if (video) {
                            if (entry.isIntersecting) {
                                video.play().catch(e=>{});
                                video.volume = 1.0;
                                video.muted = false;
                            } else {
                                video.pause();
                            }
                        }
                    });
                }, { threshold: 0.6 });
                document.querySelectorAll('.video-card').forEach(c => observer.observe(c));
            }
            
            // ==================== PROFILE ====================
            async function renderProfile(userId) {
                const userData = await dataStoreGet(`user_${userId}`, false);
                const userVideos = videosCache.filter(v => v.userId === userId);
                const isMe = userId === currentUser.id;
                const isFollowing = currentUser.followingList?.includes(userId) || false;
                
                let html = `
                    <div class="profile-header">
                        <div class="profile-top">
                            <img class="profile-avatar" src="${userData?.avatar || 'https://avatars.dicebear.com/api/avataaars/default.svg'}">
                            <div class="profile-stats">
                                <div class="stat"><span class="stat-number">${userVideos.length}</span><span class="stat-label">видео</span></div>
                                <div class="stat"><span class="stat-number">${formatCount(userData?.followers || 0)}</span><span class="stat-label">подписчики</span></div>
                                <div class="stat"><span class="stat-number">${formatCount(userData?.following || 0)}</span><span class="stat-label">подписки</span></div>
                            </div>
                        </div>
                        <div class="profile-bio"><strong>${userData?.username || userId}</strong> · ${userData?.bio || ''}</div>
                        ${!isMe ? `<button class="follow-btn ${isFollowing ? 'following' : ''}" id="followBtn">${isFollowing ? 'Отписаться' : 'Подписаться'}</button>` : ''}
                    </div>
                    <div class="video-grid" id="profileVideoGrid"></div>
                `;
                document.getElementById('profileContent').innerHTML = html;
                const grid = document.getElementById('profileVideoGrid');
                for (let v of userVideos) {
                    const vid = document.createElement('video');
                    vid.src = v.url;
                    vid.className = 'grid-video';
                    vid.muted = true;
                    vid.loop = true;
                    grid.appendChild(vid);
                }
                if (!isMe && document.getElementById('followBtn')) {
                    document.getElementById('followBtn').addEventListener('click', async () => {
                        let currentUserData = await dataStoreGet(`user_${currentUser.id}`, false);
                        if (!currentUserData.followingList) currentUserData.followingList = [];
                        if (isFollowing) {
                            currentUserData.followingList = currentUserData.followingList.filter(id => id !== userId);
                            if (userData) userData.followers = Math.max(0, (userData.followers || 0) - 1);
                            await dataStoreSet(`user_${userId}`, userData, false);
                        } else {
                            currentUserData.followingList.push(userId);
                            if (userData) userData.followers = (userData.followers || 0) + 1;
                            await dataStoreSet(`user_${userId}`, userData, false);
                        }
                        await dataStoreSet(`user_${currentUser.id}`, currentUserData, false);
                        renderProfile(userId);
                        tg.HapticFeedback.notificationOccurred('success');
                    });
                }
            }
            
            // ==================== COMMENTS ====================
            const modal = document.getElementById('commentModal');
            let currentVideoId = null;
            
            window.openCommentsForVideo = async function(videoId) {
                currentVideoId = videoId;
                const video = videosCache.find(v => v.id === videoId);
                const comments = video?.commentsList || [];
                const commentListDiv = document.getElementById('commentList');
                commentListDiv.innerHTML = comments.map(c => `
                    <div class="comment-item">
                        <div class="comment-avatar"></div>
                        <div class="comment-content">
                            <div class="comment-name">${c.username}</div>
                            <div class="comment-text">${c.text}</div>
                        </div>
                    </div>
                `).join('');
                document.getElementById('commentCountSpan').innerText = comments.length;
                modal.classList.add('show');
            };
            
            document.getElementById('closeComments').onclick = () => modal.classList.remove('show');
            document.getElementById('sendComment').onclick = async () => {
                if (!currentVideoId) return;
                const input = document.getElementById('commentInput');
                if (!input.value.trim()) return;
                await addComment(currentVideoId, currentUser.id, currentUser.username, input.value.trim());
                input.value = '';
                await loadAllVideos();
                openCommentsForVideo(currentVideoId);
                tg.HapticFeedback.impactOccurred('light');
            };
            
            // ==================== UPLOAD ====================
            const uploadStatusDiv = document.getElementById('uploadStatus');
            let selectedFile = null;
            
            document.getElementById('uploadArea').onclick = () => document.getElementById('videoFile').click();
            document.getElementById('videoFile').onchange = (e) => {
                if (e.target.files[0]) selectedFile = e.target.files[0];
            };
            
            document.getElementById('publishBtn').onclick = async () => {
                if (!selectedFile) {
                    tg.showAlert('Выберите видео');
                    return;
                }
                uploadStatusDiv.style.display = 'block';
                uploadStatusDiv.innerText = 'Загрузка на сервер...';
                
                try {
                    const uploadResult = await uploadToYYF(selectedFile, selectedFile.name);
                    uploadStatusDiv.innerText = 'Публикация...';
                    
                    const newVideo = {
                        id: 'vid_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8),
                        userId: currentUser.id,
                        username: currentUser.username,
                        userAvatar: currentUser.avatar,
                        url: uploadResult.fileUrl,
                        caption: document.getElementById('videoCaption').value || 'Новое видео',
                        music: document.getElementById('videoMusic').value || 'оригинальный звук',
                        likes: 0,
                        comments: 0,
                        saves: 0,
                        likesList: [],
                        commentsList: [],
                        timestamp: Date.now()
                    };
                    
                    await saveVideo(newVideo);
                    uploadStatusDiv.style.display = 'none';
                    tg.showAlert('Видео опубликовано!');
                    showPage('feed');
                    await renderFeed();
                    
                    document.getElementById('videoCaption').value = '';
                    document.getElementById('videoMusic').value = '';
                    document.getElementById('videoFile').value = '';
                    selectedFile = null;
                    tg.HapticFeedback.notificationOccurred('success');
                } catch (err) {
                    uploadStatusDiv.style.display = 'none';
                    tg.showAlert('Ошибка загрузки: ' + err.message);
                }
            };
            
            // ==================== NAVIGATION ====================
            const pages = document.querySelectorAll('.page');
            function showPage(pageId) {
                pages.forEach(p => p.classList.remove('active'));
                document.getElementById(`page-${pageId}`).classList.add('active');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                const activeNav = Array.from(document.querySelectorAll('.nav-item')).find(n => n.dataset.page === pageId);
                if (activeNav) activeNav.classList.add('active');
                if (pageId === 'profile') renderProfile(currentUser.id);
                if (pageId === 'feed') renderFeed();
            }
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    const page = item.dataset.page;
                    if (page) showPage(page);
                });
            });
            
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    showPage(this.dataset.tab === 'home' ? 'feed' : 'discover');
                });
            });
            
            document.getElementById('navProfile').addEventListener('click', () => renderProfile(currentUser.id));
            
            // ==================== INIT ====================
            (async function init() {
                await initUser();
                await loadAllVideos();
                if (videosCache.length === 0) {
                    // Add sample videos
                    const sampleVideos = [
                        { id: 'sample1', userId: 'sample_user1', username: 'tiktok_star', userAvatar: 'https://avatars.dicebear.com/api/avataaars/1.svg', url: 'https://assets.mixkit.co/videos/40858/40858-720.mp4', caption: 'Первый день в Telegram Tik!', music: 'оригинальный звук', likes: 1500, comments: 45, saves: 120, likesList: [], commentsList: [] },
                        { id: 'sample2', userId: 'sample_user2', username: 'content_creator', userAvatar: 'https://avatars.dicebear.com/api/avataaars/2.svg', url: 'https://assets.mixkit.co/videos/39818/39818-720.mp4', caption: 'Городские ритмы', music: 'фонк', likes: 870, comments: 23, saves: 89, likesList: [], commentsList: [] }
                    ];
                    for (let v of sampleVideos) await saveVideo(v);
                    await loadAllVideos();
                }
                await renderFeed();
            })();
        })();
    </script>
