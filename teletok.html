<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Telegram Tik · Mini App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Telegram Theme Variables */
        :root {
            --tg-bg-color: var(--tg-theme-bg-color, #000000);
            --tg-text-color: var(--tg-theme-text-color, #ffffff);
            --tg-hint-color: var(--tg-theme-hint-color, #aaaaaa);
            --tg-link-color: var(--tg-theme-link-color, #6c9ee7);
            --tg-button-color: var(--tg-theme-button-color, #3f8ef0);
            --tg-button-text-color: var(--tg-theme-button-text-color, #ffffff);
            --tg-secondary-bg-color: var(--tg-theme-secondary-bg-color, #1f1f1f);
            --tg-header-bg-color: var(--tg-theme-header-bg-color, #000000);
            --tg-accent-text-color: var(--tg-theme-accent-text-color, #3f8ef0);
            --tg-section-separator-color: var(--tg-theme-section-separator-color, #2c2c2c);
            --tg-destructive-text-color: var(--tg-theme-destructive-text-color, #ff5c5c);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--tg-bg-color);
            color: var(--tg-text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: pan-y;
        }

        .tiktok-app {
            width: 100vw;
            height: 100vh;
            background-color: var(--tg-bg-color);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background-color: var(--tg-header-bg-color);
            border-bottom: 1px solid var(--tg-section-separator-color);
            z-index: 20;
            position: relative;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            gap: 24px;
            font-weight: 600;
            font-size: 18px;
        }

        .tab {
            opacity: 0.6;
            transition: 0.2s;
            cursor: pointer;
            padding-bottom: 4px;
            color: var(--tg-text-color);
        }

        .tab.active {
            opacity: 1;
            font-weight: 600;
            border-bottom: 2px solid var(--tg-button-color);
        }

        .header-right {
            display: flex;
            gap: 20px;
            font-size: 20px;
            color: var(--tg-hint-color);
        }

        .header-right i {
            cursor: pointer;
            transition: 0.2s;
        }

        .header-right i:active {
            transform: scale(0.92);
        }

        .pages-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .page {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
            scroll-behavior: smooth;
        }

        .page.active {
            display: block;
        }

        .feed-container {
            height: 100%;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            -ms-overflow-style: none;
            scrollbar-width: none;
            background-color: var(--tg-bg-color);
        }

        .feed-container::-webkit-scrollbar {
            display: none;
        }

        .video-card {
            height: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 16px;
            color: white;
            background: #000;
            overflow: hidden;
        }

        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: auto;
            z-index: 0;
        }

        .video-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(0deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2) 100%);
            pointer-events: none;
            z-index: 1;
        }

        .video-info {
            position: relative;
            z-index: 2;
            max-width: 70%;
            pointer-events: none;
            margin-bottom: 40px;
        }

        .user-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            pointer-events: auto;
            cursor: pointer;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid var(--tg-button-color);
            object-fit: cover;
            background: var(--tg-secondary-bg-color);
        }

        .username {
            font-weight: 700;
            font-size: 16px;
            text-shadow: 0 1px 2px black;
        }

        .verified {
            color: var(--tg-button-color);
            font-size: 14px;
        }

        .caption {
            font-size: 14px;
            line-height: 1.3;
            margin-bottom: 8px;
            text-shadow: 0 1px 2px black;
        }

        .music-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            opacity: 0.9;
        }

        .action-bar {
            position: absolute;
            right: 16px;
            bottom: 100px;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            pointer-events: auto;
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .action-item i {
            font-size: 32px;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
            cursor: pointer;
            transition: 0.1s;
        }

        .action-item i:active {
            transform: scale(1.15);
        }

        .action-item .count {
            font-size: 12px;
            font-weight: 600;
            text-shadow: 0 1px 3px black;
        }

        .action-item .fa-heart.liked {
            font-weight: 900;
            color: var(--tg-destructive-text-color);
        }

        .action-item .fa-bookmark.saved {
            font-weight: 900;
            color: #ffc107;
        }

        .heart-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            color: var(--tg-destructive-text-color);
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }

        .heart-overlay.show {
            animation: heartPop 0.5s ease;
        }

        @keyframes heartPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
        }

        .loading-spinner {
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--tg-hint-color);
            font-size: 14px;
            gap: 8px;
            background: var(--tg-bg-color);
            scroll-snap-align: start;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid var(--tg-section-separator-color);
            border-top: 3px solid var(--tg-button-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 16px 14px;
            background-color: var(--tg-header-bg-color);
            border-top: 1px solid var(--tg-section-separator-color);
            flex-shrink: 0;
            z-index: 20;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
            color: var(--tg-hint-color);
            transition: 0.2s;
            cursor: pointer;
        }

        .nav-item i {
            font-size: 22px;
            margin-bottom: 2px;
        }

        .nav-item.active {
            color: var(--tg-button-color);
        }

        .nav-item .label {
            font-size: 11px;
            font-weight: 500;
        }

        .plus-button {
            background-color: var(--tg-button-color);
            color: var(--tg-button-text-color);
            width: 44px;
            height: 30px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            box-shadow: none;
        }

        .live-badge {
            background: var(--tg-destructive-text-color);
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 9px;
            font-weight: bold;
            margin-left: 6px;
        }

        .profile-header {
            padding: 20px 16px;
            background: var(--tg-secondary-bg-color);
            display: flex;
            flex-direction: column;
            gap: 16px;
            border-bottom: 1px solid var(--tg-section-separator-color);
        }

        .profile-top {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--tg-button-color);
            object-fit: cover;
            background: var(--tg-bg-color);
        }

        .profile-stats {
            display: flex;
            gap: 28px;
            flex: 1;
            justify-content: center;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 20px;
            font-weight: 700;
            color: var(--tg-text-color);
        }

        .stat-label {
            font-size: 12px;
            color: var(--tg-hint-color);
        }

        .profile-bio {
            font-size: 14px;
            color: var(--tg-text-color);
        }

        .follow-btn {
            background: var(--tg-button-color);
            border: none;
            border-radius: 30px;
            padding: 12px;
            color: var(--tg-button-text-color);
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .follow-btn.following {
            background: var(--tg-secondary-bg-color);
            color: var(--tg-text-color);
            border: 1px solid var(--tg-section-separator-color);
        }

        .follow-btn:active {
            transform: scale(0.96);
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            background: var(--tg-bg-color);
        }

        .grid-video {
            aspect-ratio: 9/16;
            background: var(--tg-secondary-bg-color);
            object-fit: cover;
            width: 100%;
            cursor: pointer;
        }

        .upload-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .upload-area {
            border: 2px dashed var(--tg-section-separator-color);
            border-radius: 28px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            background: var(--tg-secondary-bg-color);
        }

        .upload-area i {
            font-size: 48px;
            color: var(--tg-hint-color);
        }

        .upload-input {
            background: var(--tg-secondary-bg-color);
            border: 1px solid var(--tg-section-separator-color);
            border-radius: 16px;
            padding: 14px;
            color: var(--tg-text-color);
            font-size: 16px;
        }

        .comment-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .comment-modal.show {
            visibility: visible;
            opacity: 1;
        }

        .comment-sheet {
            background: var(--tg-secondary-bg-color);
            width: 100%;
            border-top-left-radius: 28px;
            border-top-right-radius: 28px;
            padding: 20px;
            color: var(--tg-text-color);
            transform: translateY(100%);
            transition: 0.2s;
            max-height: 65%;
            overflow-y: auto;
        }

        .comment-modal.show .comment-sheet {
            transform: translateY(0);
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-comments {
            font-size: 28px;
            cursor: pointer;
            color: var(--tg-hint-color);
        }

        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }

        .comment-item {
            display: flex;
            gap: 12px;
        }

        .comment-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--tg-button-color);
            flex-shrink: 0;
        }

        .comment-name {
            font-weight: 600;
            font-size: 14px;
        }

        .comment-text {
            font-size: 14px;
            color: var(--tg-hint-color);
        }

        .comment-input-area {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .comment-input {
            flex: 1;
            background: var(--tg-bg-color);
            border: 1px solid var(--tg-section-separator-color);
            border-radius: 28px;
            padding: 12px 18px;
            color: var(--tg-text-color);
            font-size: 14px;
        }

        .comment-send {
            background: var(--tg-button-color);
            border: none;
            border-radius: 28px;
            padding: 0 20px;
            color: var(--tg-button-text-color);
            font-weight: 600;
            cursor: pointer;
        }

        .upload-progress {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: var(--tg-secondary-bg-color);
            border-radius: 16px;
            padding: 12px;
            z-index: 200;
            display: none;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--tg-button-color);
        }

        .upload-progress.show {
            display: flex;
        }

        .upload-progress .spinner-small {
            width: 20px;
            height: 20px;
            border: 2px solid var(--tg-section-separator-color);
            border-top-color: var(--tg-button-color);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
    </style>
</head>
<body>
    <div class="tiktok-app">
        <div class="header">
            <div class="header-left">
                <span class="tab active" data-tab="home">Для вас</span>
                <span class="tab" data-tab="friends">Подписки</span>
            </div>
            <div class="header-right">
                <i class="fa-solid fa-magnifying-glass"></i>
                <i class="fa-regular fa-circle-check"></i>
            </div>
        </div>

        <div class="pages-container">
            <div class="page active" id="page-feed">
                <div class="feed-container" id="feedContainer"></div>
            </div>
            <div class="page" id="page-profile">
                <div id="profileContent"></div>
            </div>
            <div class="page" id="page-upload">
                <div class="upload-container">
                    <h2>Новое видео</h2>
                    <div class="upload-area" id="uploadArea">
                        <i class="fa-solid fa-cloud-upload-alt"></i>
                        <p>Выберите видео</p>
                    </div>
                    <input type="file" id="videoFile" accept="video/*">
                    <input type="text" class="upload-input" id="videoCaption" placeholder="Описание...">
                    <input type="text" class="upload-input" id="videoMusic" placeholder="Музыка">
                    <button class="follow-btn" id="publishBtn">Опубликовать</button>
                </div>
            </div>
            <div class="page" id="page-discover">
                <div style="padding:20px;color:var(--tg-hint-color);text-align:center;">Рекомендации и поиск</div>
            </div>
            <div class="page" id="page-inbox">
                <div style="padding:20px;color:var(--tg-hint-color);text-align:center;">Уведомления</div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" data-page="feed"><i class="fa-solid fa-house"></i><span class="label">Главная</span></div>
            <div class="nav-item" data-page="discover"><i class="fa-solid fa-compass"></i><span class="label">Открыть</span></div>
            <div class="nav-item plus-button" data-page="upload"><i class="fa-solid fa-plus"></i></div>
            <div class="nav-item" data-page="inbox"><i class="fa-regular fa-envelope"></i><span class="label">Сообщения</span></div>
            <div class="nav-item" data-page="profile" id="navProfile"><i class="fa-regular fa-user"></i><span class="label">Профиль</span></div>
        </div>
    </div>

    <div class="comment-modal" id="commentModal">
        <div class="comment-sheet">
            <div class="comment-header">
                <h3>Комментарии (<span id="commentCountSpan">0</span>)</h3>
                <span class="close-comments" id="closeComments">&times;</span>
            </div>
            <div class="comment-list" id="commentList"></div>
            <div class="comment-input-area">
                <input type="text" class="comment-input" placeholder="Написать комментарий..." id="commentInput">
                <button class="comment-send" id="sendComment">→</button>
            </div>
        </div>
    </div>

    <div class="upload-progress" id="uploadProgress">
        <div class="spinner-small"></div>
        <span>Загрузка видео на сервер...</span>
    </div>

    <script>
        (function() {
            // Telegram WebApp initialization
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.disableVerticalSwipes();
            tg.MainButton.hide();
            tg.ready();

            // Apply Telegram theme
            function applyTelegramTheme() {
                const root = document.documentElement;
                const tp = tg.themeParams;
                if (tp) {
                    root.style.setProperty('--tg-theme-bg-color', tp.bg_color || '#000000');
                    root.style.setProperty('--tg-theme-text-color', tp.text_color || '#ffffff');
                    root.style.setProperty('--tg-theme-hint-color', tp.hint_color || '#aaaaaa');
                    root.style.setProperty('--tg-theme-button-color', tp.button_color || '#3f8ef0');
                    root.style.setProperty('--tg-theme-button-text-color', tp.button_text_color || '#ffffff');
                    root.style.setProperty('--tg-theme-secondary-bg-color', tp.secondary_bg_color || '#1f1f1f');
                    root.style.setProperty('--tg-theme-section-separator-color', tp.section_separator_color || '#2c2c2c');
                    root.style.setProperty('--tg-theme-destructive-text-color', tp.destructive_text_color || '#ff5c5c');
                }
            }
            applyTelegramTheme();
            tg.onEvent('themeChanged', applyTelegramTheme);

            // Game Jolt API Configuration
            const GJ_CONFIG = {
                gameId: 1059240,
                privateKey: '7fc4e6f9e8966f0c40bebd4dbe3f6322',
                apiUrl: 'https://api.gamejolt.com/api/game/v1_2'
            };

            // MD5 implementation for Game Jolt signatures
            function md5(string) {
                function rotateLeft(lValue, iShiftBits) {
                    return (lValue << iShiftBits) | (lValue >>> (32 - iShiftBits));
                }
                function addUnsigned(lX, lY) {
                    let lX4, lY4, lX8, lY8, lResult;
                    lX8 = (lX & 0x80000000);
                    lY8 = (lY & 0x80000000);
                    lX4 = (lX & 0x40000000);
                    lY4 = (lY & 0x40000000);
                    lResult = (lX & 0x3FFFFFFF) + (lY & 0x3FFFFFFF);
                    if (lX4 & lY4) return (lResult ^ 0x80000000 ^ lX8 ^ lY8);
                    if (lX4 | lY4) {
                        if (lResult & 0x40000000) return (lResult ^ 0xC0000000 ^ lX8 ^ lY8);
                        else return (lResult ^ 0x40000000 ^ lX8 ^ lY8);
                    } else return (lResult ^ lX8 ^ lY8);
                }
                function F(x, y, z) { return (x & y) | ((~x) & z); }
                function G(x, y, z) { return (x & z) | (y & (~z)); }
                function H(x, y, z) { return (x ^ y ^ z); }
                function I(x, y, z) { return (y ^ (x | (~z))); }
                function FF(a, b, c, d, x, s, ac) {
                    a = addUnsigned(a, addUnsigned(addUnsigned(F(b, c, d), x), ac));
                    return addUnsigned(rotateLeft(a, s), b);
                }
                function GG(a, b, c, d, x, s, ac) {
                    a = addUnsigned(a, addUnsigned(addUnsigned(G(b, c, d), x), ac));
                    return addUnsigned(rotateLeft(a, s), b);
                }
                function HH(a, b, c, d, x, s, ac) {
                    a = addUnsigned(a, addUnsigned(addUnsigned(H(b, c, d), x), ac));
                    return addUnsigned(rotateLeft(a, s), b);
                }
                function II(a, b, c, d, x, s, ac) {
                    a = addUnsigned(a, addUnsigned(addUnsigned(I(b, c, d), x), ac));
                    return addUnsigned(rotateLeft(a, s), b);
                }
                function convertToWordArray(string) {
                    let wordArray = [];
                    let wordCount = ((string.length + 8) >> 6) + 1;
                    for (let i = 0; i < wordCount * 16; i++) wordArray[i] = 0;
                    for (let i = 0; i < string.length; i++) wordArray[i >> 2] |= (string.charCodeAt(i) & 0xFF) << (i % 4 * 8);
                    wordArray[string.length >> 2] |= 0x80 << (string.length % 4 * 8);
                    wordArray[wordCount * 16 - 2] = string.length * 8;
                    return wordArray;
                }
                let x = convertToWordArray(string);
                let a = 0x67452301, b = 0xEFCDAB89, c = 0x98BADCFE, d = 0x10325476;
                for (let k = 0; k < x.length; k += 16) {
                    let AA = a, BB = b, CC = c, DD = d;
                    a = FF(a, b, c, d, x[k + 0], 7, 0xD76AA478);
                    d = FF(d, a, b, c, x[k + 1], 12, 0xE8C7B756);
                    c = FF(c, d, a, b, x[k + 2], 17, 0x242070DB);
                    b = FF(b, c, d, a, x[k + 3], 22, 0xC1BDCEEE);
                    a = FF(a, b, c, d, x[k + 4], 7, 0xF57C0FAF);
                    d = FF(d, a, b, c, x[k + 5], 12, 0x4787C62A);
                    c = FF(c, d, a, b, x[k + 6], 17, 0xA8304613);
                    b = FF(b, c, d, a, x[k + 7], 22, 0xFD469501);
                    a = FF(a, b, c, d, x[k + 8], 7, 0x698098D8);

                    b = GG(b, c, d, a, x[k + 12], 20, 0x8D2A4C8A);
                    a = HH(a, b, c, d, x[k + 5], 4, 0xFFFA3942);
                    d = HH(d, a, b, c, x[k + 8], 11, 0x8771F681);
                    c = HH(c, d, a, b, x[k + 11], 16, 0x6D9D6122);

                    b = HH(b, c, d, a, x[k + 10], 23, 0xBEBFBC70);
                    a = HH(a, b, c, d, x[k + 13], 4, 0x289B7EC6);
                    d = HH(d, a, b, c, x[k + 0], 11, 0xEAA127FA);

                    c = II(c, d, a, b, x[k + 14], 15, 0xAB9423A7);
                    b = II(b, c, d, a, x[k + 5], 21, 0xFC93A039);
                    a = II(a, b, c, d, x[k + 12], 6, 0x655B59C3);
                    d = II(d, a, b, c, x[k + 3], 10, 0x8F0CCC92);
                    c = II(c, d, a, b, x[k + 10], 15, 0xFFEFF47D);
                    b = II(b, c, d, a, x[k + 1], 21, 0x85845DD1);
                    a = II(a, b, c, d, x[k + 8], 6, 0x6FA87E4F);
                    d = II(d, a, b, c, x[k + 15], 10, 0xFE2CE6E0);
                    c = II(c, d, a, b, x[k + 6], 15, 0xA3014314);

                    b = II(b, c, d, a, x[k + 9], 21, 0xEB86D391);
                    a = addUnsigned(a, AA);
                    b = addUnsigned(b, BB);
                    c = addUnsigned(c, CC);
                    d = addUnsigned(d, DD);
                }
                let result = '';
                [a, b, c, d].forEach(num => {
                    for (let i = 0; i < 4; i++) {
                        result += ('0' + ((num >>> (i * 8)) & 0xFF).toString(16)).slice(-2);
                    }
                });
                return result;
            }

            // Game Jolt API wrapper
            class GameJoltAPI {
                constructor(gameId, privateKey) {
                    this.gameId = gameId;
                    this.privateKey = privateKey;
                }

                async _request(endpoint, params = {}, sendUser = false, username = null, userToken = null) {
                    let url = `${GJ_CONFIG.apiUrl}${endpoint}?game_id=${this.gameId}`;
                    for (const [key, value] of Object.entries(params)) {
                        url += `&${key}=${encodeURIComponent(value)}`;
                    }
                    if (sendUser && username && userToken) {
                        url += `&username=${encodeURIComponent(username)}&user_token=${encodeURIComponent(userToken)}`;
                    }
                    url += `&format=json&signature=${md5(url + this.privateKey)}`;
                    
                    try {
                        const response = await fetch(url);
                        const data = await response.json();
                        return data.response;
                    } catch (error) {
                        console.error('Game Jolt API error:', error);
                        return { success: false, message: error.message };
                    }
                }

                async dataStoreSet(username, userToken, key, data, isUserStore = true) {
                    return this._request('/data-store/set/', { key, data }, isUserStore, username, userToken);
                }

                async dataStoreGet(username, userToken, key, isUserStore = true) {
                    return this._request('/data-store/', { key }, isUserStore, username, userToken);
                }

                async dataStoreGetKeys(username, userToken, pattern = '*', isUserStore = true) {
                    return this._request('/data-store/get-keys/', { pattern }, isUserStore, username, userToken);
                }
            }

            // YeetYourFiles upload function
            const YYF_URL = 'https://yyf.mubilop.com';

            async function uploadToYYF(file) {
                const formData = new FormData();
                formData.append('file', file);
                
                const response = await fetch(`${YYF_URL}/api/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    throw new Error(`Upload failed: ${response.status}`);
                }
                
                const result = await response.json();
                return {
                    fileId: result.fileId,
                    fileUrl: YYF_URL + result.fileUrl,
                    shortHash: result.shortHash
                };
            }

            // Current user from Telegram
            const currentUser = {
                id: tg.initDataUnsafe?.user?.id?.toString() || 'telegram_' + Date.now(),
                username: tg.initDataUnsafe?.user?.username || tg.initDataUnsafe?.user?.first_name || 'user',
                avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${tg.initDataUnsafe?.user?.id || 'default'}`,
                verified: tg.initDataUnsafe?.user?.is_premium || false,
                followers: 0,
                following: 0,
                bio: 'TikTok on Telegram'
            };

            const gjAPI = new GameJoltAPI(GJ_CONFIG.gameId, GJ_CONFIG.privateKey);
            
            // Data structures
            let videos = [];
            let likedVideos = new Map();
            let savedVideos = new Map();
            let videoComments = new Map();
            let followingRelations = new Set();

            // Load data from Game Jolt
            async function loadAllData() {
                const progressDiv = document.getElementById('uploadProgress');
                progressDiv.querySelector('span').textContent = 'Загрузка данных с сервера...';
                progressDiv.classList.add('show');
                
                try {
                    // Load videos list
                    const videosData = await gjAPI.dataStoreGet(currentUser.username, currentUser.id, 'videos_list', true);
                    if (videosData.success && videosData.data) {
                        try {
                            videos = JSON.parse(videosData.data);
                        } catch(e) { videos = []; }
                    }
                    
                    // Load user profile
                    const profileData = await gjAPI.dataStoreGet(currentUser.username, currentUser.id, 'profile', true);
                    if (profileData.success && profileData.data) {
                        try {
                            const savedProfile = JSON.parse(profileData.data);
                            currentUser.followers = savedProfile.followers || 0;
                            currentUser.following = savedProfile.following || 0;
                            currentUser.bio = savedProfile.bio || currentUser.bio;
                        } catch(e) {}
                    }
                    
                    // Load liked videos
                    const likedData = await gjAPI.dataStoreGet(currentUser.username, currentUser.id, 'liked', true);
                    if (likedData.success && likedData.data) {
                        try {
                            const likedArray = JSON.parse(likedData.data);
                            likedArray.forEach(id => likedVideos.set(id, true));
                        } catch(e) {}
                    }
                    
                    // Load saved videos
                    const savedData = await gjAPI.dataStoreGet(currentUser.username, currentUser.id, 'saved', true);
                    if (savedData.success && savedData.data) {
                        try {
                            const savedArray = JSON.parse(savedData.data);
                            savedArray.forEach(id => savedVideos.set(id, true));
                        } catch(e) {}
                    }
                    
                    // Load following
                    const followingData = await gjAPI.dataStoreGet(currentUser.username, currentUser.id, 'following', true);
                    if (followingData.success && followingData.data) {
                        try {
                            const followingArray = JSON.parse(followingData.data);
                            followingArray.forEach(id => followingRelations.add(id));
                        } catch(e) {}
                    }
                    
                    // Load comments for videos
                    for (const video of videos) {
                        const commentsData = await gjAPI.dataStoreGet(currentUser.username, currentUser.id, `comments_${video.id}`, true);
                        if (commentsData.success && commentsData.data) {
                            try {
                                videoComments.set(video.id, JSON.parse(commentsData.data));
                            } catch(e) {
                                videoComments.set(video.id, []);
                            }
                        } else {
                            videoComments.set(video.id, []);
                        }
                    }
                    
                } catch (error) {
                    console.error('Error loading data:', error);
                }
                
                progressDiv.classList.remove('show');
            }
            
            // Save data to Game Jolt
            async function saveAllData() {
                try {
                    await gjAPI.dataStoreSet(currentUser.username, currentUser.id, 'videos_list', JSON.stringify(videos), true);
                    await gjAPI.dataStoreSet(currentUser.username, currentUser.id, 'profile', JSON.stringify({
                        followers: currentUser.followers,
                        following: currentUser.following,
                        bio: currentUser.bio
                    }), true);
                    await gjAPI.dataStoreSet(currentUser.username, currentUser.id, 'liked', JSON.stringify(Array.from(likedVideos.keys())), true);
                    await gjAPI.dataStoreSet(currentUser.username, currentUser.id, 'saved', JSON.stringify(Array.from(savedVideos.keys())), true);
                    await gjAPI.dataStoreSet(currentUser.username, currentUser.id, 'following', JSON.stringify(Array.from(followingRelations)), true);
                    
                    for (const [videoId, comments] of videoComments) {
                        await gjAPI.dataStoreSet(currentUser.username, currentUser.id, `comments_${videoId}`, JSON.stringify(comments), true);
                    }
                } catch (error) {
                    console.error('Error saving data:', error);
                }
            }
            
            // Add sample videos if empty
            if (videos.length === 0) {
                videos = [
                    { id: 'v1', userId: currentUser.id, url: 'https://assets.mixkit.co/videos/40858/40858-720.mp4', caption: 'Первый день в TikTok! 🔥', music: 'оригинальный звук', likes: 234, comments: 12, saves: 34 },
                    { id: 'v2', userId: currentUser.id, url: 'https://assets.mixkit.co/videos/39818/39818-720.mp4', caption: 'Городские ритмы', music: 'фонк', likes: 87, comments: 4, saves: 12 },
                    { id: 'v3', userId: currentUser.id, url: 'https://assets.mixkit.co/videos/40745/40745-720.mp4', caption: 'Красивый закат', music: 'лофи', likes: 150, comments: 8, saves: 23 }
                ];
                saveAllData();
            }
            
            function formatCount(num) {
                if (num >= 1000000) return (num/1000000).toFixed(1)+'M';
                if (num >= 1000) return (num/1000).toFixed(1)+'K';
                return num.toString();
            }
            
            function likeVideo(videoId, likeIcon, likeCountSpan, heartOverlay = null) {
                const liked = !likedVideos.get(videoId);
                likedVideos.set(videoId, liked);
                const video = videos.find(v => v.id === videoId);
                if (liked) video.likes += 1;
                else video.likes -= 1;
                likeIcon.classList.toggle('fa-regular');
                likeIcon.classList.toggle('fa-solid');
                likeIcon.classList.toggle('liked', liked);
                likeCountSpan.innerText = formatCount(video.likes);
                if (heartOverlay) {
                    heartOverlay.classList.remove('show');
                    void heartOverlay.offsetWidth;
                    heartOverlay.classList.add('show');
                }
                tg.HapticFeedback.impactOccurred('light');
                saveAllData();
            }
            
            function createVideoCard(video) {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.dataset.videoId = video.id;
                const isLiked = likedVideos.get(video.id) || false;
                const isSaved = savedVideos.get(video.id) || false;
                card.innerHTML = `
                    <video class="bg-video" src="${video.url}" loop playsinline></video>
                    <div class="heart-overlay"><i class="fa-solid fa-heart"></i></div>
                    <div class="video-info">
                        <div class="user-row">
                            <img class="avatar" src="${currentUser.avatar}">
                            <span class="username">${currentUser.username}</span>
                            ${currentUser.verified ? '<i class="fa-solid fa-circle-check verified"></i>' : ''}
                            <span class="live-badge">LIVE</span>
                        </div>
                        <div class="caption">${video.caption}</div>
                        <div class="music-row">
                            <div class="music-icon"><i class="fa-solid fa-music"></i></div>
                            <span>${video.music}</span>
                        </div>
                    </div>
                    <div class="action-bar">
                        <div class="action-item like-item">
                            <i class="fa-regular fa-heart ${isLiked ? 'liked' : ''}" data-action="like"></i>
                            <span class="count like-count">${formatCount(video.likes)}</span>
                        </div>
                        <div class="action-item comment-item">
                            <i class="fa-regular fa-comment" data-action="comment"></i>
                            <span class="count comment-count">${formatCount(video.comments)}</span>
                        </div>
                        <div class="action-item save-item">
                            <i class="fa-regular fa-bookmark ${isSaved ? 'saved' : ''}" data-action="save"></i>
                            <span class="count save-count">${formatCount(video.saves)}</span>
                        </div>
                        <div class="action-item share-item">
                            <i class="fa-solid fa-share" data-action="share"></i>
                            <span class="count">12K</span>
                        </div>
                    </div>
                `;
                
                const videoEl = card.querySelector('.bg-video');
                videoEl.volume = 1.0;
                videoEl.muted = false;
                
                videoEl.addEventListener('dblclick', (e) => {
                    e.stopPropagation();
                    likeVideo(video.id, card.querySelector('[data-action="like"]'), card.querySelector('.like-count'), card.querySelector('.heart-overlay'));
                });
                
                card.querySelector('[data-action="like"]').addEventListener('click', (e) => {
                    e.stopPropagation();
                    likeVideo(video.id, card.querySelector('[data-action="like"]'), card.querySelector('.like-count'), null);
                });
                
                card.querySelector('[data-action="save"]').addEventListener('click', (e) => {
                    e.stopPropagation();
                    const newSaved = !savedVideos.get(video.id);
                    savedVideos.set(video.id, newSaved);
                    const icon = card.querySelector('[data-action="save"]');
                    icon.classList.toggle('fa-regular');
                    icon.classList.toggle('fa-solid');
                    icon.classList.toggle('saved', newSaved);
                    saveAllData();
                });
                
                card.querySelector('[data-action="comment"]').addEventListener('click', () => openCommentsForVideo(video.id));
                card.querySelector('[data-action="share"]').addEventListener('click', () => {
                    tg.showAlert(`Поделиться видео: ${video.caption}`);
                });
                
                return card;
            }
            
            const feed = document.getElementById('feedContainer');
            
            function renderFeed() {
                feed.innerHTML = '';
                const shuffled = [...videos].sort(() => Math.random() - 0.5);
                shuffled.forEach(v => feed.appendChild(createVideoCard(v)));
                const spinner = document.createElement('div');
                spinner.className = 'loading-spinner';
                spinner.id = 'loadingSpinner';
                spinner.innerHTML = `<div class="spinner"></div><span>Загрузка новых видео...</span>`;
                feed.appendChild(spinner);
                setupVideoAutoplay();
            }
            
            function setupVideoAutoplay() {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const video = entry.target.querySelector('.bg-video');
                        if (video) {
                            if (entry.isIntersecting) {
                                video.play().catch(e=>{});
                                video.volume = 1.0;
                                video.muted = false;
                            } else {
                                video.pause();
                            }
                        }
                    });
                }, { root: feed, threshold: 0.6 });
                document.querySelectorAll('.video-card').forEach(c => observer.observe(c));
            }
            
            function renderProfile() {
                const userVideos = videos.filter(v => v.userId === currentUser.id);
                let html = `
                    <div class="profile-header">
                        <div class="profile-top">
                            <img class="profile-avatar" src="${currentUser.avatar}">
                            <div class="profile-stats">
                                <div class="stat"><span class="stat-number">${userVideos.length}</span><span class="stat-label">видео</span></div>
                                <div class="stat"><span class="stat-number">${formatCount(currentUser.followers)}</span><span class="stat-label">подписчики</span></div>
                                <div class="stat"><span class="stat-number">${formatCount(currentUser.following)}</span><span class="stat-label">подписки</span></div>
                            </div>
                        </div>
                        <div class="profile-bio"><strong>${currentUser.username}</strong> · ${currentUser.bio}</div>
                    </div>
                    <div class="video-grid" id="profileVideoGrid"></div>
                `;
                document.getElementById('profileContent').innerHTML = html;
                const grid = document.getElementById('profileVideoGrid');
                userVideos.forEach(v => {
                    const vid = document.createElement('video');
                    vid.src = v.url;
                    vid.className = 'grid-video';
                    vid.muted = true;
                    vid.loop = true;
                    grid.appendChild(vid);
                });
            }
            
            // Comments modal
            const modal = document.getElementById('commentModal');
            let currentVideoId = null;
            
            function openCommentsForVideo(videoId) {
                currentVideoId = videoId;
                const comments = videoComments.get(videoId) || [];
                const commentListDiv = document.getElementById('commentList');
                commentListDiv.innerHTML = comments.map(c => `
                    <div class="comment-item">
                        <div class="comment-avatar"></div>
                        <div class="comment-content">
                            <div class="comment-name">${c.user}</div>
                            <div class="comment-text">${c.text}</div>
                        </div>
                    </div>
                `).join('');
                document.getElementById('commentCountSpan').innerText = comments.length;
                modal.classList.add('show');
            }
            
            document.getElementById('closeComments').onclick = () => modal.classList.remove('show');
            document.getElementById('sendComment').onclick = () => {
                if (!currentVideoId) return;
                const input = document.getElementById('commentInput');
                if (!input.value.trim()) return;
                const comments = videoComments.get(currentVideoId) || [];
                comments.push({ user: currentUser.username, text: input.value.trim() });
                videoComments.set(currentVideoId, comments);
                const video = videos.find(v => v.id === currentVideoId);
                if (video) video.comments += 1;
                input.value = '';
                openCommentsForVideo(currentVideoId);
                tg.HapticFeedback.impactOccurred('light');
                saveAllData();
            };
            
            // Upload functionality
            const uploadArea = document.getElementById('uploadArea');
            const videoFileInput = document.getElementById('videoFile');
            const publishBtn = document.getElementById('publishBtn');
            const progressDiv = document.getElementById('uploadProgress');
            
            uploadArea.onclick = () => videoFileInput.click();
            
            publishBtn.onclick = async () => {
                const file = videoFileInput.files[0];
                if (!file) {
                    tg.showAlert('Выберите видео');
                    return;
                }
                
                const caption = document.getElementById('videoCaption').value || 'Мое видео';
                const music = document.getElementById('videoMusic').value || 'оригинальный звук';
                
                progressDiv.classList.add('show');
                progressDiv.querySelector('span').textContent = 'Загрузка на сервер...';
                
                try {
                    const uploadResult = await uploadToYYF(file);
                    
                    progressDiv.querySelector('span').textContent = 'Сохранение данных...';
                    
                    const newVideo = {
                        id: 'vid_' + Date.now(),
                        userId: currentUser.id,
                        url: uploadResult.fileUrl,
                        caption: caption,
                        music: music,
                        likes: 0,
                        comments: 0,
                        saves: 0
                    };
                    
                    videos.unshift(newVideo);
                    videoComments.set(newVideo.id, []);
                    await saveAllData();
                    
                    progressDiv.classList.remove('show');
                    tg.showAlert('Видео успешно опубликовано!');
                    
                    videoFileInput.value = '';
                    document.getElementById('videoCaption').value = '';
                    document.getElementById('videoMusic').value = '';
                    
                    showPage('feed');
                    renderFeed();
                    
                } catch (error) {
                    progressDiv.classList.remove('show');
                    tg.showAlert('Ошибка загрузки: ' + error.message);
                }
            };
            
            // Navigation
            const pages = document.querySelectorAll('.page');
            function showPage(pageId) {
                pages.forEach(p => p.classList.remove('active'));
                document.getElementById(`page-${pageId}`).classList.add('active');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                const activeNav = Array.from(document.querySelectorAll('.nav-item')).find(n => n.dataset.page === pageId);
                if (activeNav) activeNav.classList.add('active');
                if (pageId === 'profile') renderProfile();
                if (pageId === 'feed') renderFeed();
            }
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    const page = item.dataset.page;
                    if (page) showPage(page);
                });
            });
            
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    showPage(this.dataset.tab === 'home' ? 'feed' : 'discover');
                });
            });
            
            document.getElementById('navProfile').addEventListener('click', () => showPage('profile'));
            
            // Initialize
            loadAllData().then(() => {
                renderFeed();
            });
        })();
    </script>
