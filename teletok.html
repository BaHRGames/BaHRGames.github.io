<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Telegram Tik · Cloud Mini App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Telegram Theme Variables */
        :root {
            --tg-bg-color: var(--tg-theme-bg-color, #000000);
            --tg-text-color: var(--tg-theme-text-color, #ffffff);
            --tg-hint-color: var(--tg-theme-hint-color, #aaaaaa);
            --tg-link-color: var(--tg-theme-link-color, #6c9ee7);
            --tg-button-color: var(--tg-theme-button-color, #3f8ef0);
            --tg-button-text-color: var(--tg-theme-button-text-color, #ffffff);
            --tg-secondary-bg-color: var(--tg-theme-secondary-bg-color, #1f1f1f);
            --tg-header-bg-color: var(--tg-theme-header-bg-color, #000000);
            --tg-accent-text-color: var(--tg-theme-accent-text-color, #3f8ef0);
            --tg-section-separator-color: var(--tg-theme-section-separator-color, #2c2c2c);
            --tg-destructive-text-color: var(--tg-theme-destructive-text-color, #ff5c5c);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--tg-bg-color);
            color: var(--tg-text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: pan-y;
        }

        .tiktok-app {
            width: 100vw;
            height: 100vh;
            background-color: var(--tg-bg-color);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background-color: var(--tg-header-bg-color);
            border-bottom: 1px solid var(--tg-section-separator-color);
            z-index: 20;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            gap: 24px;
            font-weight: 600;
            font-size: 18px;
        }

        .tab {
            opacity: 0.6;
            transition: 0.2s;
            cursor: pointer;
            padding-bottom: 4px;
            color: var(--tg-text-color);
        }

        .tab.active {
            opacity: 1;
            font-weight: 600;
            border-bottom: 2px solid var(--tg-button-color);
        }

        .header-right {
            display: flex;
            gap: 20px;
            font-size: 20px;
            color: var(--tg-hint-color);
        }

        .header-right i {
            cursor: pointer;
            transition: 0.2s;
        }

        .pages-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .page {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
            scroll-behavior: smooth;
        }

        .page.active {
            display: block;
        }

        .feed-container {
            height: 100%;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            -ms-overflow-style: none;
            scrollbar-width: none;
            background-color: var(--tg-bg-color);
        }

        .feed-container::-webkit-scrollbar {
            display: none;
        }

        .video-card {
            height: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 16px;
            color: white;
            background: #000;
            overflow: hidden;
        }

        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: auto;
            z-index: 0;
        }

        .video-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(0deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2) 100%);
            pointer-events: none;
            z-index: 1;
        }

        .video-info {
            position: relative;
            z-index: 2;
            max-width: 70%;
            pointer-events: none;
            margin-bottom: 40px;
        }

        .user-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            pointer-events: auto;
            cursor: pointer;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid var(--tg-button-color);
            object-fit: cover;
            background: var(--tg-secondary-bg-color);
        }

        .username {
            font-weight: 700;
            font-size: 16px;
            text-shadow: 0 1px 2px black;
        }

        .verified {
            color: var(--tg-button-color);
            font-size: 14px;
        }

        .caption {
            font-size: 14px;
            line-height: 1.3;
            margin-bottom: 8px;
            text-shadow: 0 1px 2px black;
        }

        .music-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            opacity: 0.9;
        }

        .action-bar {
            position: absolute;
            right: 16px;
            bottom: 100px;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            pointer-events: auto;
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .action-item i {
            font-size: 32px;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
            cursor: pointer;
            transition: 0.1s;
        }

        .action-item i:active {
            transform: scale(1.15);
        }

        .action-item .count {
            font-size: 12px;
            font-weight: 600;
            text-shadow: 0 1px 3px black;
        }

        .action-item .fa-heart.liked {
            font-weight: 900;
            color: var(--tg-destructive-text-color);
        }

        .action-item .fa-bookmark.saved {
            font-weight: 900;
            color: #ffc107;
        }

        .heart-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            color: var(--tg-destructive-text-color);
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }

        .heart-overlay.show {
            animation: heartPop 0.5s ease;
        }

        @keyframes heartPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
        }

        .loading-spinner {
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--tg-hint-color);
            font-size: 14px;
            gap: 8px;
            background: var(--tg-bg-color);
            scroll-snap-align: start;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid var(--tg-section-separator-color);
            border-top: 3px solid var(--tg-button-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 16px 14px;
            background-color: var(--tg-header-bg-color);
            border-top: 1px solid var(--tg-section-separator-color);
            flex-shrink: 0;
            z-index: 20;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
            color: var(--tg-hint-color);
            transition: 0.2s;
            cursor: pointer;
        }

        .nav-item i {
            font-size: 22px;
            margin-bottom: 2px;
        }

        .nav-item.active {
            color: var(--tg-button-color);
        }

        .nav-item .label {
            font-size: 11px;
            font-weight: 500;
        }

        .plus-button {
            background-color: var(--tg-button-color);
            color: var(--tg-button-text-color);
            width: 44px;
            height: 30px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
        }

        .live-badge {
            background: var(--tg-destructive-text-color);
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 9px;
            font-weight: bold;
            margin-left: 6px;
        }

        .profile-header {
            padding: 20px 16px;
            background: var(--tg-secondary-bg-color);
            display: flex;
            flex-direction: column;
            gap: 16px;
            border-bottom: 1px solid var(--tg-section-separator-color);
        }

        .profile-top {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--tg-button-color);
            object-fit: cover;
        }

        .profile-stats {
            display: flex;
            gap: 28px;
            flex: 1;
            justify-content: center;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 20px;
            font-weight: 700;
            color: var(--tg-text-color);
        }

        .stat-label {
            font-size: 12px;
            color: var(--tg-hint-color);
        }

        .profile-bio {
            font-size: 14px;
            color: var(--tg-text-color);
        }

        .follow-btn {
            background: var(--tg-button-color);
            border: none;
            border-radius: 30px;
            padding: 12px;
            color: var(--tg-button-text-color);
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .follow-btn.following {
            background: var(--tg-secondary-bg-color);
            color: var(--tg-text-color);
            border: 1px solid var(--tg-section-separator-color);
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            background: var(--tg-bg-color);
        }

        .grid-video {
            aspect-ratio: 9/16;
            background: var(--tg-secondary-bg-color);
            object-fit: cover;
            width: 100%;
            cursor: pointer;
        }

        .upload-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .upload-area {
            border: 2px dashed var(--tg-section-separator-color);
            border-radius: 28px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            background: var(--tg-secondary-bg-color);
        }

        .upload-area i {
            font-size: 48px;
            color: var(--tg-hint-color);
        }

        .upload-input {
            background: var(--tg-secondary-bg-color);
            border: 1px solid var(--tg-section-separator-color);
            border-radius: 16px;
            padding: 14px;
            color: var(--tg-text-color);
            font-size: 16px;
        }

        .upload-progress {
            background: var(--tg-secondary-bg-color);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            color: var(--tg-button-color);
        }

        .comment-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .comment-modal.show {
            visibility: visible;
            opacity: 1;
        }

        .comment-sheet {
            background: var(--tg-secondary-bg-color);
            width: 100%;
            border-top-left-radius: 28px;
            border-top-right-radius: 28px;
            padding: 20px;
            color: var(--tg-text-color);
            transform: translateY(100%);
            transition: 0.2s;
            max-height: 65%;
            overflow-y: auto;
        }

        .comment-modal.show .comment-sheet {
            transform: translateY(0);
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-comments {
            font-size: 28px;
            cursor: pointer;
            color: var(--tg-hint-color);
        }

        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }

        .comment-item {
            display: flex;
            gap: 12px;
        }

        .comment-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--tg-button-color);
            flex-shrink: 0;
        }

        .comment-name {
            font-weight: 600;
            font-size: 14px;
        }

        .comment-text {
            font-size: 14px;
            color: var(--tg-hint-color);
        }

        .comment-input-area {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .comment-input {
            flex: 1;
            background: var(--tg-bg-color);
            border: 1px solid var(--tg-section-separator-color);
            border-radius: 28px;
            padding: 12px 18px;
            color: var(--tg-text-color);
            font-size: 14px;
        }

        .comment-send {
            background: var(--tg-button-color);
            border: none;
            border-radius: 28px;
            padding: 0 20px;
            color: var(--tg-button-text-color);
            font-weight: 600;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--tg-secondary-bg-color);
            color: var(--tg-text-color);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 200;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="tiktok-app">
        <div class="header">
            <div class="header-left">
                <span class="tab active" data-tab="home">Для вас</span>
                <span class="tab" data-tab="friends">Подписки</span>
            </div>
            <div class="header-right">
                <i class="fa-solid fa-magnifying-glass"></i>
                <i class="fa-regular fa-circle-check"></i>
            </div>
        </div>

        <div class="pages-container">
            <div class="page active" id="page-feed">
                <div class="feed-container" id="feedContainer">
                    <div class="loading-spinner"><div class="spinner"></div><span>Загрузка видео...</span></div>
                </div>
            </div>
            <div class="page" id="page-profile">
                <div id="profileContent"></div>
            </div>
            <div class="page" id="page-upload">
                <div class="upload-container">
                    <h2>Новое видео</h2>
                    <div class="upload-area" id="uploadArea">
                        <i class="fa-solid fa-cloud-upload-alt"></i>
                        <p>Выберите видео</p>
                    </div>
                    <input type="file" id="videoFile" accept="video/*">
                    <input type="text" class="upload-input" id="videoCaption" placeholder="Описание...">
                    <input type="text" class="upload-input" id="videoMusic" placeholder="Музыка">
                    <button class="follow-btn" id="publishBtn">Опубликовать</button>
                    <div id="uploadProgress" class="upload-progress" style="display: none;"></div>
                </div>
            </div>
            <div class="page" id="page-discover">
                <div style="padding:20px;color:var(--tg-hint-color);text-align:center;">Рекомендации и поиск</div>
            </div>
            <div class="page" id="page-inbox">
                <div style="padding:20px;color:var(--tg-hint-color);text-align:center;">Уведомления</div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" data-page="feed"><i class="fa-solid fa-house"></i><span class="label">Главная</span></div>
            <div class="nav-item" data-page="discover"><i class="fa-solid fa-compass"></i><span class="label">Открыть</span></div>
            <div class="nav-item plus-button" data-page="upload"><i class="fa-solid fa-plus"></i></div>
            <div class="nav-item" data-page="inbox"><i class="fa-regular fa-envelope"></i><span class="label">Сообщения</span></div>
            <div class="nav-item" data-page="profile" id="navProfile"><i class="fa-regular fa-user"></i><span class="label">Профиль</span></div>
        </div>
    </div>

    <div class="comment-modal" id="commentModal">
        <div class="comment-sheet">
            <div class="comment-header">
                <h3>Комментарии (<span id="commentCountSpan">0</span>)</h3>
                <span class="close-comments" id="closeComments">&times;</span>
            </div>
            <div class="comment-list" id="commentList"></div>
            <div class="comment-input-area">
                <input type="text" class="comment-input" placeholder="Написать комментарий..." id="commentInput">
                <button class="comment-send" id="sendComment">→</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        (function() {
            // ==================== TELEGRAM INIT ====================
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.disableVerticalSwipes();
            tg.MainButton.hide();
            tg.ready();

            // Применение темы
            function applyTelegramTheme() {
                const root = document.documentElement;
                const tp = tg.themeParams;
                if (tp) {
                    root.style.setProperty('--tg-theme-bg-color', tp.bg_color || '#000000');
                    root.style.setProperty('--tg-theme-text-color', tp.text_color || '#ffffff');
                    root.style.setProperty('--tg-theme-hint-color', tp.hint_color || '#aaaaaa');
                    root.style.setProperty('--tg-theme-button-color', tp.button_color || '#3f8ef0');
                    root.style.setProperty('--tg-theme-button-text-color', tp.button_text_color || '#ffffff');
                    root.style.setProperty('--tg-theme-secondary-bg-color', tp.secondary_bg_color || '#1f1f1f');
                    root.style.setProperty('--tg-theme-section-separator-color', tp.section_separator_color || '#2c2c2c');
                    root.style.setProperty('--tg-theme-destructive-text-color', tp.destructive_text_color || '#ff5c5c');
                }
            }
            applyTelegramTheme();
            tg.onEvent('themeChanged', applyTelegramTheme);

            // ==================== GAME JOLT API SETUP ====================
            const GAME_ID = 1059240;
            const PRIVATE_KEY = '7fc4e6f9e8966f0c40bebd4dbe3f6322';
            const GJ_API = 'https://api.gamejolt.com/api/game/v1_2';

            // MD5 Implementation
            function md5(string) {
                function rotateLeft(lValue, iShiftBits) {
                    return (lValue << iShiftBits) | (lValue >>> (32 - iShiftBits));
                }
                function addUnsigned(lX, lY) {
                    let lX4, lY4, lX8, lY8, lResult;
                    lX8 = (lX & 0x80000000);
                    lY8 = (lY & 0x80000000);
                    lX4 = (lX & 0x40000000);
                    lY4 = (lY & 0x40000000);
                    lResult = (lX & 0x3FFFFFFF) + (lY & 0x3FFFFFFF);
                    if (lX4 & lY4) return (lResult ^ 0x80000000 ^ lX8 ^ lY8);
                    if (lX4 | lY4) {
                        if (lResult & 0x40000000) return (lResult ^ 0xC0000000 ^ lX8 ^ lY8);
                        else return (lResult ^ 0x40000000 ^ lX8 ^ lY8);
                    } else return (lResult ^ lX8 ^ lY8);
                }
                function F(x, y, z) { return (x & y) | ((~x) & z); }
                function G(x, y, z) { return (x & z) | (y & (~z)); }
                function H(x, y, z) { return (x ^ y ^ z); }
                function I(x, y, z) { return (y ^ (x | (~z))); }
                function FF(a, b, c, d, x, s, ac) {
                    a = addUnsigned(a, addUnsigned(addUnsigned(F(b, c, d), x), ac));
                    return addUnsigned(rotateLeft(a, s), b);
                }
                function GG(a, b, c, d, x, s, ac) {
                    a = addUnsigned(a, addUnsigned(addUnsigned(G(b, c, d), x), ac));
                    return addUnsigned(rotateLeft(a, s), b);
                }
                function HH(a, b, c, d, x, s, ac) {
                    a = addUnsigned(a, addUnsigned(addUnsigned(H(b, c, d), x), ac));
                    return addUnsigned(rotateLeft(a, s), b);
                }
                function II(a, b, c, d, x, s, ac) {
                    a = addUnsigned(a, addUnsigned(addUnsigned(I(b, c, d), x), ac));
                    return addUnsigned(rotateLeft(a, s), b);
                }
                function convertToWordArray(string) {
                    let wordArray = [];
                    let wordCount = ((string.length + 8) >> 6) + 1;
                    for (let i = 0; i < wordCount * 16; i++) wordArray[i] = 0;
                    for (let i = 0; i < string.length; i++) wordArray[i >> 2] |= string.charCodeAt(i) << (i % 4) * 8;
                    wordArray[string.length >> 2] |= 0x80 << (string.length % 4) * 8;
                    wordArray[wordCount * 16 - 2] = string.length * 8;
                    return wordArray;
                }
                function wordToHex(wordArray) {
                    let hex = "";
                    for (let i = 0; i < wordArray.length; i++) {
                        let word = wordArray[i];
                        hex += ((word >> 24) & 0xFF).toString(16).padStart(2, '0');
                        hex += ((word >> 16) & 0xFF).toString(16).padStart(2, '0');
                        hex += ((word >> 8) & 0xFF).toString(16).padStart(2, '0');
                        hex += (word & 0xFF).toString(16).padStart(2, '0');
                    }
                    return hex;
                }
                let x = convertToWordArray(string);
                let a = 0x67452301;
                let b = 0xEFCDAB89;
                let c = 0x98BADCFE;
                let d = 0x10325476;
                for (let k = 0; k < x.length; k += 16) {
                    let AA = a, BB = b, CC = c, DD = d;
                    a = FF(a, b, c, d, x[k + 0], 7, 0xD76AA478);
                    d = FF(d, a, b, c, x[k + 1], 12, 0xE8C7B756);
                    c = FF(c, d, a, b, x[k + 2], 17, 0x242070DB);
                    b = FF(b, c, d, a, x[k + 3], 22, 0xC1BDCEEE);

            function gjRequest(endpoint, params = {}, useAuth = false) {
                return new Promise((resolve, reject) => {
                    let url = `${GJ_API}${endpoint}?game_id=${GAME_ID}`;
                    if (useAuth && currentUser && currentUser.username && currentUser.token) {
                        url += `&username=${encodeURIComponent(currentUser.username)}&user_token=${encodeURIComponent(currentUser.token)}`;
                    }
                    for (let key in params) {
                        url += `&${key}=${encodeURIComponent(params[key])}`;
                    }
                    const signature = md5(url + PRIVATE_KEY);
                    url += `&signature=${signature}&format=json`;
                    
                    fetch(url)
                        .then(res => res.json())
                        .then(data => {
                            if (data.response && data.response.success === 'true') {
                                resolve(data.response);
                            } else {
                                reject(data.response || { message: 'Request failed' });
                            }
                        })
                        .catch(reject);
                });
            }

            // ==================== DATA STORE HELPERS ====================
            async function dataStoreSet(key, value, isUser = false) {
                const result = await gjRequest('/data-store/set/', {
                    key: key,
                    data: JSON.stringify(value)
                }, isUser);
                return result;
            }

            async function dataStoreGet(key, isUser = false) {
                const result = await gjRequest('/data-store/', { key: key }, isUser);
                if (result.success === 'true' && result.data) {
                    try {
                        return JSON.parse(result.data);
                    } catch(e) {
                        return result.data;
                    }
                }
                return null;
            }

            // ==================== YEETYOURFILES UPLOAD ====================
            const YYF_URL = 'https://yyf.mubilop.com';

            async function uploadToYYF(file, fileName) {
                const formData = new FormData();
                formData.append('file', file, fileName);
                
                const response = await fetch(`${YYF_URL}/api/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) throw new Error('Upload to YYF failed');
                const result = await response.json();
                return `${YYF_URL}${result.fileUrl}`;
            }

            // ==================== VIDEO MANAGEMENT ====================
            let allVideos = [];
            let likedVideos = new Map();
            let savedVideos = new Map();
            let videoComments = new Map();

            async function loadVideos() {
                try {
                    const videosData = await dataStoreGet('all_videos', false);
                    if (videosData && Array.isArray(videosData)) {
                        allVideos = videosData;
                    } else {
                        allVideos = [];
                    }
                    
                    for (let video of allVideos) {
                        const comments = await dataStoreGet(`comments_${video.id}`, false);
                        if (comments) videoComments.set(video.id, comments);
                        else videoComments.set(video.id, []);
                    }
                } catch(e) {
                    console.error('Failed to load videos:', e);
                }
            }

            async function saveVideos() {
                await dataStoreSet('all_videos', allVideos, false);
            }

            async function saveComments(videoId) {
                await dataStoreSet(`comments_${videoId}`, videoComments.get(videoId) || [], false);
            }

            async function addVideo(videoData) {
                const newVideo = {
                    id: 'vid_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8),
                    userId: currentUser.id,
                    username: currentUser.username,
                    userAvatar: currentUser.avatar,
                    url: videoData.url,
                    caption: videoData.caption,
                    music: videoData.music,
                    likes: 0,
                    comments: 0,
                    saves: 0,
                    timestamp: Date.now()
                };
                allVideos.unshift(newVideo);
                videoComments.set(newVideo.id, []);
                await saveVideos();
                
                if (currentUser.userData) {
                    if (!currentUser.userData.videos) currentUser.userData.videos = [];
                    currentUser.userData.videos.push(newVideo.id);
                    await saveUser();
                }
                
                return newVideo;
            }

            async function likeVideo(videoId, increment = true) {
                const video = allVideos.find(v => v.id === videoId);
                if (video) {
                    if (increment) {
                        video.likes++;
                        likedVideos.set(videoId, true);
                    } else {
                        video.likes--;
                        likedVideos.set(videoId, false);
                    }
                    await saveVideos();
                }
            }

            async function addComment(videoId, user, text) {
                const comments = videoComments.get(videoId) || [];
                comments.push({ user: user, text: text, timestamp: Date.now() });
                videoComments.set(videoId, comments);
                const video = allVideos.find(v => v.id === videoId);
                if (video) video.comments = comments.length;
                await saveComments(videoId);
                await saveVideos();
            }

            function renderFeed() {
                feedContainer.innerHTML = '';
                if (allVideos.length === 0) {
                    feedContainer.innerHTML = '<div style="text-align:center;padding:40px;color:var(--tg-hint-color);">Нет видео. Загрузите первое!</div>';
                    return;
                }
                const shuffled = [...allVideos].sort(() => Math.random() - 0.5);
                shuffled.forEach(v => feedContainer.appendChild(createVideoCard(v)));
                setupVideoAutoplay();
            }
            
            function setupVideoAutoplay() {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const video = entry.target.querySelector('.bg-video');
                        if (video) {
                            if (entry.isIntersecting) {
                                video.play().catch(e => {});
                                video.volume = 1.0;
                                video.muted = false;
                            } else {
                                video.pause();
                            }
                        }
                    });
                }, { root: feedContainer, threshold: 0.6 });
                document.querySelectorAll('.video-card').forEach(c => observer.observe(c));
            }

            });
            
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    showPage(this.dataset.tab === 'home' ? 'feed' : 'discover');
                });
            });
            
            document.getElementById('navProfile').addEventListener('click', () => showProfile(currentUser.id));
            
            // ==================== INIT ====================
            async function init() {
                await loadOrCreateUser();
                await loadVideos();
                renderFeed();
            }
            
            init();
        })();
    </script>
</body>
</html>
