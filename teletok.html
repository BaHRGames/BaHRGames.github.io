<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TikTok Cloud · Game Jolt + YeetYourFiles</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: pan-y;
        }

        .tiktok-app {
            width: 100vw;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            color: white;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px 8px;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 20;
            position: relative;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            gap: 24px;
            font-weight: 600;
            font-size: 18px;
        }

        .tab {
            opacity: 0.6;
            transition: 0.2s;
            cursor: pointer;
            padding-bottom: 4px;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            opacity: 1;
            border-bottom: 2px solid #ff3b5c;
        }

        .header-right {
            display: flex;
            gap: 18px;
            font-size: 20px;
        }

        .header-right i {
            cursor: pointer;
        }

        /* Pages */
        .pages-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .page {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
        }

        .page.active {
            display: block;
        }

        /* Feed */
        .feed-container {
            height: 100%;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .feed-container::-webkit-scrollbar {
            display: none;
        }

        .video-card {
            height: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 16px;
            color: white;
            background: #000;
            overflow: hidden;
        }

        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: auto;
            z-index: 0;
        }

        .video-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(0deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.1) 40%, rgba(0,0,0,0.2) 100%);
            pointer-events: none;
            z-index: 1;
        }

        .video-info {
            position: relative;
            z-index: 2;
            max-width: 70%;
            pointer-events: none;
            margin-bottom: 40px;
        }

        .user-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            pointer-events: auto;
            cursor: pointer;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid white;
            object-fit: cover;
        }

        .username {
            font-weight: 700;
            font-size: 16px;
        }

        .verified {
            color: #3897f0;
            font-size: 14px;
        }

        .caption {
            font-size: 14px;
            line-height: 1.3;
            margin-bottom: 8px;
            text-shadow: 0 1px 2px black;
        }

        .music-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            opacity: 0.9;
        }

        .action-bar {
            position: absolute;
            right: 16px;
            bottom: 120px;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            pointer-events: auto;
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .action-item i {
            font-size: 32px;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5));
            cursor: pointer;
            transition: 0.1s;
        }

        .action-item i:active {
            transform: scale(1.2);
        }

        .action-item .count {
            font-size: 12px;
            font-weight: 600;
            text-shadow: 0 2px 4px black;
        }

        .action-item .fa-heart.liked {
            font-weight: 900;
            color: #ff3b5c;
        }

        .action-item .fa-bookmark.saved {
            font-weight: 900;
            color: #ffc107;
        }

        .heart-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            color: #ff3b5c;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }

        .heart-overlay.show {
            animation: heartPop 0.5s ease;
        }

        @keyframes heartPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
        }

        .loading-spinner {
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            gap: 8px;
            scroll-snap-align: start;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 16px 12px;
            background-color: #000;
            border-top: 1px solid #222;
            flex-shrink: 0;
            z-index: 20;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
            color: #888;
            transition: 0.2s;
            cursor: pointer;
        }

        .nav-item i {
            font-size: 22px;
            margin-bottom: 2px;
        }

        .nav-item.active {
            color: white;
        }

        .plus-button {
            background-color: white;
            color: black;
            width: 42px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
        }

        /* Profile */
        .profile-header {
            padding: 20px 16px;
            background: #111;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .profile-avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 3px solid white;
            object-fit: cover;
        }

        .profile-stats {
            display: flex;
            gap: 40px;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 20px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 12px;
            color: #aaa;
        }

        .follow-btn {
            background: #ff3b5c;
            border: none;
            border-radius: 8px;
            padding: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .follow-btn.following {
            background: #333;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
        }

        .grid-video {
            aspect-ratio: 9/16;
            background: #222;
            object-fit: cover;
            width: 100%;
            cursor: pointer;
        }

        /* Upload */
        .upload-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .upload-area {
            border: 2px dashed #444;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
        }

        .upload-area i {
            font-size: 48px;
            color: #888;
        }

        #videoFile {
            display: none;
        }

        .upload-input {
            background: #222;
            border: none;
            border-radius: 10px;
            padding: 12px;
            color: white;
        }

        .upload-progress {
            background: #333;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            color: #ff3b5c;
        }

        /* Comments Modal */
        .comment-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .comment-modal.show {
            visibility: visible;
            opacity: 1;
        }

        .comment-sheet {
            background: #1a1a1a;
            width: 100%;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 20px;
            color: white;
            transform: translateY(100%);
            transition: 0.2s;
            max-height: 60%;
            overflow-y: auto;
        }

        .comment-modal.show .comment-sheet {
            transform: translateY(0);
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-comments {
            font-size: 24px;
            cursor: pointer;
        }

        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }

        .comment-item {
            display: flex;
            gap: 12px;
        }

        .comment-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #333;
        }

        .comment-input-area {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .comment-input {
            flex: 1;
            background: #333;
            border: none;
            border-radius: 24px;
            padding: 12px 16px;
            color: white;
        }

        .comment-send {
            background: #ff3b5c;
            border: none;
            border-radius: 24px;
            padding: 0 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .status-badge {
            position: fixed;
            bottom: 80px;
            left: 16px;
            background: rgba(0,0,0,0.7);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="tiktok-app">
        <div class="header">
            <div class="header-left">
                <span class="tab active" data-tab="home">Для вас</span>
                <span class="tab" data-tab="friends">Подписки</span>
            </div>
            <div class="header-right">
                <i class="fa-solid fa-magnifying-glass"></i>
                <i class="fa-regular fa-circle-check"></i>
            </div>
        </div>

        <div class="pages-container">
            <div class="page active" id="page-feed">
                <div class="feed-container" id="feedContainer">
                    <div class="loading-spinner"><div class="spinner"></div><span>Загрузка видео...</span></div>
                </div>
            </div>
            <div class="page" id="page-profile">
                <div id="profileContent"></div>
            </div>

                    <button class="follow-btn" id="publishBtn">📤 Опубликовать</button>
                </div>
            </div>
            <div class="page" id="page-discover">
                <div style="padding:20px;color:white;text-align:center;">🔍 Рекомендации</div>
            </div>
            <div class="page" id="page-inbox">
                <div style="padding:20px;color:white;text-align:center;">💬 Уведомления</div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" data-page="feed"><i class="fa-solid fa-house"></i><span class="label">Главная</span></div>
            <div class="nav-item" data-page="discover"><i class="fa-solid fa-compass"></i><span class="label">Открыть</span></div>
            <div class="nav-item plus-button" data-page="upload"><i class="fa-solid fa-plus"></i></div>
            <div class="nav-item" data-page="inbox"><i class="fa-regular fa-envelope"></i><span class="label">Входящие</span></div>
            <div class="nav-item" data-page="profile"><i class="fa-regular fa-user"></i><span class="label">Профиль</span></div>
        </div>
    </div>

    <div class="comment-modal" id="commentModal">
        <div class="comment-sheet">
            <div class="comment-header">
                <h3>Комментарии (<span id="commentCountSpan">0</span>)</h3>
                <span class="close-comments" id="closeComments">&times;</span>
            </div>
            <div class="comment-list" id="commentList"></div>
            <div class="comment-input-area">
                <input type="text" class="comment-input" placeholder="Написать комментарий..." id="commentInput">
                <button class="comment-send" id="sendComment">→</button>
            </div>
        </div>
    </div>

    <div class="status-badge" id="statusBadge">🌐 Подключение к серверу...</div>

    <script>
        // ==================== Game Jolt API Configuration ====================
        const GJ_API = {

        // ==================== MD5 Implementation ====================
        function md5(string) {
            function rotateLeft(lValue, iShiftBits) {
                return (lValue << iShiftBits) | (lValue >>> (32 - iShiftBits));
            }
            function addUnsigned(lX, lY) {
                let lX4, lY4, lX8, lY8, lResult;
                lX8 = (lX & 0x80000000);
                lY8 = (lY & 0x80000000);
                lX4 = (lX & 0x40000000);
                lY4 = (lY & 0x40000000);
                lResult = (lX & 0x3FFFFFFF) + (lY & 0x3FFFFFFF);
                if (lX4 & lY4) return (lResult ^ 0x80000000 ^ lX8 ^ lY8);
                if (lX4 | lY4) {
                    if (lResult & 0x40000000) return (lResult ^ 0xC0000000 ^ lX8 ^ lY8);
                    else return (lResult ^ 0x40000000 ^ lX8 ^ lY8);
                } else return (lResult ^ lX8 ^ lY8);
            }
            function F(x, y, z) { return (x & y) | ((~x) & z); }
            function G(x, y, z) { return (x & z) | (y & (~z)); }
            function H(x, y, z) { return (x ^ y ^ z); }
            function I(x, y, z) { return (y ^ (x | (~z))); }
            function FF(a, b, c, d, x, s, ac) {
                a = addUnsigned(a, addUnsigned(addUnsigned(F(b, c, d), x), ac));
                return addUnsigned(rotateLeft(a, s), b);
            }
            function GG(a, b, c, d, x, s, ac) {
                a = addUnsigned(a, addUnsigned(addUnsigned(G(b, c, d), x), ac));
                return addUnsigned(rotateLeft(a, s), b);
            }
            function HH(a, b, c, d, x, s, ac) {
                a = addUnsigned(a, addUnsigned(addUnsigned(H(b, c, d), x), ac));
                return addUnsigned(rotateLeft(a, s), b);
            }
            function II(a, b, c, d, x, s, ac) {
                a = addUnsigned(a, addUnsigned(addUnsigned(I(b, c, d), x), ac));
                return addUnsigned(rotateLeft(a, s), b);
            }
            function convertToWordArray(string) {
                let lWordCount;
                let lMessageLength = string.length;
                let lNumberOfWords_temp1 = lMessageLength + 8;
                let lNumberOfWords_temp2 = (lNumberOfWords_temp1 - (lNumberOfWords_temp1 % 64)) / 64;
                let lNumberOfWords = (lNumberOfWords_temp2 + 1) * 16;
                let lWordArray = Array(lNumberOfWords - 1);
                let lBytePosition = 0;
                let lByteCount = 0;
                while (lByteCount < lMessageLength) {
                    lWordCount = (lByteCount - (lByteCount % 4)) / 4;
                    lBytePosition = (lByteCount % 4) * 8;
                    lWordArray[lWordCount] = (lWordArray[lWordCount] | (string.charCodeAt(lByteCount) << lBytePosition));
                    lByteCount++;
                }
                lWordCount = (lByteCount - (lByteCount % 4)) / 4;
                lBytePosition = (lByteCount % 4) * 8;
                lWordArray[lWordCount] = lWordArray[lWordCount] | (0x80 << lBytePosition);
                lWordArray[lNumberOfWords - 2] = lMessageLength << 3;
                lWordArray[lNumberOfWords - 1] = lMessageLength >>> 29;
                return lWordArray;
            }
            function wordToHex(lValue) {
                let wordToHexValue = "", wordToHexValue_temp = "", lByte, lCount;
                for (lCount = 0; lCount <= 3; lCount++) {
                    lByte = (lValue >>> (lCount * 8)) & 255;
                    wordToHexValue_temp = "0" + lByte.toString(16);
                    wordToHexValue = wordToHexValue + wordToHexValue_temp.substr(wordToHexValue_temp.length - 2, 2);
                }
                return wordToHexValue;
            }
            let x = convertToWordArray(string);

                d = HH(d, a, b, c, x[k + 12], 11, 0xE6DB99E5);
                c = HH(c, d, a, b, x[k + 15], 16, 0x1FA27CF8);
                b = HH(b, c, d, a, x[k + 2], 23, 0xC4AC5665);
                a = II(a, b, c, d, x[k + 0], 6, 0xF4292244);
                d = II(d, a, b, c, x[k + 7], 10, 0x432AFF97);
                c = II(c, d, a, b, x[k + 14], 15, 0xAB9423A7);
                b = II(b, c, d, a, x[k + 5], 21, 0xFC93A039);
                a = II(a, b, c, d, x[k + 12], 6, 0x655B59C3);
                d = II(d, a, b, c, x[k + 3], 10, 0x8F0CCC92);
                c = II(c, d, a, b, x[k + 10], 15, 0xFFEFF47D);
                b = II(b, c, d, a, x[k + 1], 21, 0x85845DD1);
                a = II(a, b, c, d, x[k + 8], 6, 0x6FA87E4F);
                d = II(d, a, b, c, x[k + 15], 10, 0xFE2CE6E0);
                c = II(c, d, a, b, x[k + 6], 15, 0xA3014314);
                b = II(b, c, d, a, x[k + 13], 21, 0x4E0811A1);
                a = II(a, b, c, d, x[k + 4], 6, 0xF7537E82);
                d = II(d, a, b, c, x[k + 11], 10, 0xBD3AF235);
                c = II(c, d, a, b, x[k + 2], 15, 0x2AD7D2BB);
                b = II(b, c, d, a, x[k + 9], 21, 0xEB86D391);
                a = addUnsigned(a, AA);
                b = addUnsigned(b, BB);
                c = addUnsigned(c, CC);
                d = addUnsigned(d, DD);
            }
            return (wordToHex(a) + wordToHex(b) + wordToHex(c) + wordToHex(d)).toLowerCase();
        }

        // ==================== Game Jolt Request Function ====================
        async function gjRequest(endpoint, params = {}, useUser = false) {
            const urlParams = new URLSearchParams({
                game_id: GJ_API.gameId,
                format: 'json',
                ...params
            });
            
            const url = `${GJ_API.base}${endpoint}?${urlParams.toString()}`;
            const signature = md5(url + GJ_API.privateKey);
            const finalUrl = `${url}&signature=${signature}`;
            
            try {
                const response = await fetch(finalUrl);
                const data = await response.json();
                return data.response;
            } catch (error) {
                console.error('Game Jolt API error:', error);
                return { success: false, message: error.message };
            }
        }

        // ==================== YeetYourFiles Upload ====================
        async function uploadToYYF(file, fileName, onProgress) {
            const formData = new FormData();
            formData.append('file', file, fileName);
            
            const response = await fetch(`${YYF_API}/api/upload`, {
                method: 'POST',
                body: formData
            });
            
            if (!response.ok) throw new Error('Upload failed');
            const result = await response.json();
            return `${YYF_API}${result.fileUrl}`;
        }

        // ==================== Data Store Functions ====================
        async function saveToDataStore(key, data, isUser = false) {
            const params = { key: key, data: JSON.stringify(data) };
            if (isUser && window.currentUser && window.currentUser.token) {
                params.username = window.currentUser.username;
                params.user_token = window.currentUser.token;
            }
            return await gjRequest('/data-store/set/', params);
        }

        async function loadFromDataStore(key, isUser = false) {
            const params = { key: key };
            if (isUser && window.currentUser && window.currentUser.token) {
                params.username = window.currentUser.username;
                params.user_token = window.currentUser.token;
            }
            const result = await gjRequest('/data-store/', params);
            if (result.success === 'true' && result.data) {
                try {
                    return JSON.parse(result.data);
                } catch {
                    return result.data;
                }
            }
            return null;
        }

        async function getAllKeys(pattern = '*') {
            return await gjRequest('/data-store/get-keys/', { pattern: pattern });
        }

        // ==================== Main Application ====================
        let videos = [];
        let currentUser = {
            id: 'user_' + Date.now(),
            username: 'creator_' + Math.floor(Math.random() * 10000),
            avatar: 'https://i.pravatar.cc/150?img=' + Math.floor(Math.random() * 70),
            verified: false,
            followers: 0,
            following: 0,
            bio: '🎬 TikTok Creator'
        };
        
        let likedVideos = new Map();
        let savedVideos = new Map();
        let videoComments = new Map();

        // Load data from Game Jolt
        async function loadAllData() {
            const statusBadge = document.getElementById('statusBadge');
            statusBadge.textContent = '📡 Загрузка данных...';
            
            // Load videos
            const savedVideosData = await loadFromDataStore('all_videos');
            if (savedVideosData && Array.isArray(savedVideosData)) {
                videos = savedVideosData;
            } else {
                // Demo videos
                videos = [
                    { id: 'v1', userId: 'user_demo1', username: 'travel_lover', userAvatar: 'https://i.pravatar.cc/150?img=1', videoUrl: 'https://assets.mixkit.co/videos/40858/40858-720.mp4', caption: 'Невероятный закат 🌅', music: 'оригинальный звук', likes: 23400, comments: 120, saves: 3400, timestamp: Date.now() },
                    { id: 'v2', userId: 'user_demo2', username: 'music_daily', userAvatar: 'https://i.pravatar.cc/150?img=2', videoUrl: 'https://assets.mixkit.co/videos/39818/39818-720.mp4', caption: 'Музыка внутри нас 🎵', music: 'фонк', likes: 8700, comments: 45, saves: 1200, timestamp: Date.now() },
                    { id: 'v3', userId: 'user_demo3', username: 'art_vision', userAvatar: 'https://i.pravatar.cc/150?img=3', videoUrl: 'https://assets.mixkit.co/videos/40745/40745-720.mp4', caption: 'Искусство в каждом кадре 🎨', music: 'лофи', likes: 15000, comments: 89, saves: 2300, timestamp: Date.now() }
                ];
                await saveToDataStore('all_videos', videos);
            }
            
            // Load user data if exists
            const savedUser = localStorage.getItem('tiktok_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
            } else {
                localStorage.setItem('tiktok_user', JSON.stringify(currentUser));
            }
            
            statusBadge.textContent = '✅ Готово к работе';
            setTimeout(() => {
                statusBadge.style.opacity = '0.5';
            }, 3000);
        }

        // Save videos to cloud
        async function syncVideos() {
            await saveToDataStore('all_videos', videos);
        }

        // Upload video with YYF
        async function publishVideo(file, caption, music) {
            const progressDiv = document.getElementById('uploadProgress');
            progressDiv.style.display = 'block';
            progressDiv.innerHTML = '📤 Загрузка видео на сервер...';
            
            try {
                const videoUrl = await uploadToYYF(file, file.name);
                progressDiv.innerHTML = '✅ Видео загружено! Сохраняем данные...';
                
                const newVideo = {
                    id: 'vid_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
                    userId: currentUser.id,
                    username: currentUser.username,
                    userAvatar: currentUser.avatar,
                    videoUrl: videoUrl,
                    caption: caption || 'Новое видео',
                    music: music || 'оригинальный звук',
                    likes: 0,
                    comments: 0,
                    saves: 0,
                    timestamp: Date.now()
                };
                
                videos.unshift(newVideo);
                await syncVideos();
                
                progressDiv.innerHTML = '🎉 Опубликовано!';
                setTimeout(() => {
                    progressDiv.style.display = 'none';
                }, 2000);
                
                return newVideo;
            } catch (error) {
                progressDiv.innerHTML = '❌ Ошибка: ' + error.message;
                setTimeout(() => {
                    progressDiv.style.display = 'none';
                }, 3000);
                throw error;
            }
        }

        // Render functions
        function renderFeed() {
            const feedContainer = document.getElementById('feedContainer');
            if (!feedContainer) return;
            
            feedContainer.innerHTML = '';
            
            videos.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.dataset.videoId = video.id;
                
                const isLiked = likedVideos.get(video.id) || false;
                const isSaved = savedVideos.get(video.id) || false;
                
                card.innerHTML = `
                    <video class="bg-video" src="${video.videoUrl}" loop playsinline></video>
                    <div class="heart-overlay"><i class="fa-solid fa-heart"></i></div>
                    <div class="video-info">
                        <div class="user-row" data-userid="${video.userId}">
                            <img class="avatar" src="${video.userAvatar}">
                            <span class="username">${video.username}</span>
                            ${video.userId === currentUser.id ? '<i class="fa-solid fa-circle-check verified"></i>' : ''}
                        </div>
                        <div class="caption">${video.caption}</div>
                        <div class="music-row">
                            <div class="music-icon"><i class="fa-solid fa-music"></i></div>
                            <span>${video.music}</span>
                        </div>
                    </div>
                    <div class="action-bar">
                        <div class="action-item">
                            <i class="${isLiked ? 'fa-solid fa-heart liked' : 'fa-regular fa-heart'}" data-action="like"></i>
                            <span class="count">${formatCount(video.likes)}</span>
                        </div>
                        <div class="action-item">
                            <i class="fa-regular fa-comment" data-action="comment"></i>
                            <span class="count">${formatCount(video.comments)}</span>
                        </div>
                        <div class="action-item">
                            <i class="${isSaved ? 'fa-solid fa-bookmark saved' : 'fa-regular fa-bookmark'}" data-action="save"></i>
                            <span class="count">${formatCount(video.saves)}</span>
                        </div>
                    </div>
                `;
                
                const videoEl = card.querySelector('.bg-video');
                videoEl.volume = 1.0;
                videoEl.muted = false;
                
                videoEl.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (videoEl.paused) videoEl.play();
                    else videoEl.pause();
                });
                
                videoEl.addEventListener('dblclick', () => handleLike(video.id, card));
                
                card.querySelector('[data-action="like"]').addEventListener('click', (e) => {
                    e.stopPropagation();
                    handleLike(video.id, card);
                });
                
                card.querySelector('[data-action="comment"]').addEventListener('click', () => openComments(video.id));
                card.querySelector('[data-action="save"]').addEventListener('click', (e) => {
                    e.stopPropagation();
                    handleSave(video.id, card);
                });
                
                feedContainer.appendChild(card);
            });
            
            setupVideoAutoplay();
        }
        
        async function handleLike(videoId, card) {
            const video = videos.find(v => v.id === videoId);
            const isLiked = likedVideos.get(videoId);
            const likeIcon = card.querySelector('[data-action="like"]');
            const likeCountSpan = likeIcon.parentElement.querySelector('.count');
            
            if (isLiked) {
                likedVideos.set(videoId, false);
                video.likes--;
                likeIcon.className = 'fa-regular fa-heart';
            } else {
                likedVideos.set(videoId, true);
                video.likes++;
                likeIcon.className = 'fa-solid fa-heart liked';
            }
            
            likeCountSpan.textContent = formatCount(video.likes);
            await syncVideos();
        }
        
        async function handleSave(videoId, card) {
            const video = videos.find(v => v.id === videoId);
            const isSaved = savedVideos.get(videoId);
            const saveIcon = card.querySelector('[data-action="save"]');
            
            if (isSaved) {
                savedVideos.set(videoId, false);
                video.saves--;
                saveIcon.className = 'fa-regular fa-bookmark';
            } else {
                savedVideos.set(videoId, true);
                video.saves++;
                saveIcon.className = 'fa-solid fa-bookmark saved';
            }
            
            await syncVideos();
        }
        
        function formatCount(num) {
            if (num >= 1000000) return (num/1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num/1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        function setupVideoAutoplay() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('.bg-video');
                    if (video) {
                        if (entry.isIntersecting) {
                            video.play().catch(e => console.log('play error', e));
                        } else {
                            video.pause();
                        }
                    }
                });
            }, { threshold: 0.6 });
            
            document.querySelectorAll('.video-card').forEach(card => observer.observe(card));
        }
        
        function openComments(videoId) {
            const modal = document.getElementById('commentModal');
            const comments = videoComments.get(videoId) || [];
            const commentList = document.getElementById('commentList');
            
            commentList.innerHTML = comments.map(c => `
                <div class="comment-item">
                    <div class="comment-avatar"></div>
                    <div><strong>${c.user}</strong><br>${c.text}</div>
                </div>
            `).join('');
            
            document.getElementById('commentCountSpan').textContent = comments.length;
            modal.classList.add('show');
            
            window.currentCommentVideoId = videoId;
        }
        
        // Navigation
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${pageId}`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const activeNav = Array.from(document.querySelectorAll('.nav-item')).find(n => n.dataset.page === pageId);
            if (activeNav) activeNav.classList.add('active');
            
            if (pageId === 'feed') renderFeed();
            if (pageId === 'profile') renderProfile();
        }
        
        function renderProfile() {
            const userVideos = videos.filter(v => v.userId === currentUser.id);
            const profileContent = document.getElementById('profileContent');
            profileContent.innerHTML = `
                <div class="profile-header">
                    <img class="profile-avatar" src="${currentUser.avatar}">
                    <div class="profile-stats">
                        <div class="stat"><span class="stat-number">${userVideos.length}</span><span class="stat-label">видео</span></div>
                        <div class="stat"><span class="stat-number">${formatCount(currentUser.followers)}</span><span class="stat-label">подписчики</span></div>
                        <div class="stat"><span class="stat-number">${formatCount(currentUser.following)}</span><span class="stat-label">подписки</span></div>
                    </div>
                    <div class="profile-bio">${currentUser.bio}</div>
                    <button class="follow-btn" id="editProfileBtn">✏️ Редактировать профиль</button>
                </div>
                <div class="video-grid" id="profileVideoGrid"></div>
            `;
            
            const grid = document.getElementById('profileVideoGrid');
            userVideos.forEach(video => {
                const videoEl = document.createElement('video');
                videoEl.src = video.videoUrl;
                videoEl.className = 'grid-video';
                videoEl.muted = true;
                videoEl.loop = true;
                videoEl.addEventListener('click', () => alert('🎬 Видео: ' + video.caption));
                grid.appendChild(videoEl);
            });
            
            document.getElementById('editProfileBtn')?.addEventListener('click', () => {
                const newName = prompt('Новое имя пользователя:', currentUser.username);
                if (newName) currentUser.username = newName;
                const newBio = prompt('Новая информация:', currentUser.bio);
                if (newBio) currentUser.bio = newBio;
                localStorage.setItem('tiktok_user', JSON.stringify(currentUser));
                renderProfile();
            });
        }
        
        // Initialize
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                const page = item.dataset.page;
                if (page) showPage(page);
            });
        });
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                showPage(this.dataset.tab === 'home' ? 'feed' : 'discover');
            });
        });
        
        document.getElementById('uploadArea').addEventListener('click', () => {
            document.getElementById('videoFile').click();
        });
        
        document.getElementById('publishBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('videoFile');
            const caption = document.getElementById('videoCaption').value;
            const music = document.getElementById('videoMusic').value;
            
            if (!fileInput.files || !fileInput.files[0]) {
                alert('Выберите видео для загрузки');
                return;
            }
            
            await publishVideo(fileInput.files[0], caption, music);
            showPage('feed');
            
            fileInput.value = '';
            document.getElementById('videoCaption').value = '';
            document.getElementById('videoMusic').value = '';
        });
        
        document.getElementById('closeComments').addEventListener('click', () => {
            document.getElementById('commentModal').classList.remove('show');
        });
        
        document.getElementById('sendComment').addEventListener('click', async () => {
            const input = document.getElementById('commentInput');
            if (!input.value.trim() || !window.currentCommentVideoId) return;
            
            const comments = videoComments.get(window.currentCommentVideoId) || [];
            comments.push({ user: currentUser.username, text: input.value });
            videoComments.set(window.currentCommentVideoId, comments);
            
            const video = videos.find(v => v.id === window.currentCommentVideoId);
            if (video) video.comments++;
            
            await syncVideos();
            input.value = '';
            openComments(window.currentCommentVideoId);
        });
        
        // Start
        loadAllData().then(() => {
            renderFeed();
        });
    </script>
</body>
</html>
