<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeApp | Запуск</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Контейнер для игры занимает ВЕСЬ экран */
        .game-frame-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
        }

        .game-frame {
            width: 100%;
            height: 100%;
            border: none;
            transition: all 0.2s ease;
        }

        /* Специальный класс для ландшафтных игр */
        .game-frame.landscape {
            width: 100vh;  /* Меняем ширину и высоту местами */
            height: 100vw;
            transform: rotate(90deg) translateY(-100%);
            transform-origin: left top;
            object-fit: cover;
        }

        /* Лоадер */
        .loader-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--tg-theme-bg-color, #1a1a1a);
            z-index: 10;
            gap: 20px;
        }

        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--tg-theme-secondary-bg-color, #333);
            border-top-color: var(--tg-theme-button-color, #40a7e3);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loader-text {
            color: var(--tg-theme-hint-color, #999);
            font-size: 16px;
        }

        /* Сообщение об ошибке */
        .error-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.9);
            z-index: 20;
        }

        .error-card {
            background: var(--tg-theme-secondary-bg-color, #222);
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <div class="game-frame-container" id="frameContainer">
        <iframe class="game-frame" id="gameFrame" 
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads" 
                allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture; fullscreen">
        </iframe>
    </div>

    <div class="loader-container" id="loader">
        <div class="loader-spinner"></div>
        <div class="loader-text">Загружаем игру...</div>
    </div>

    <div id="errorOverlay" style="display: none;" class="error-overlay">
        <div class="error-card">
            <div style="font-size: 48px; margin-bottom: 20px;">😵</div>
            <div style="font-size: 18px; margin-bottom: 20px;">Не удалось загрузить игру</div>
            <button class="fullscreen-button" onclick="goBack()" style="padding: 12px 24px; background: var(--tg-theme-button-color); border: none; border-radius: 30px; color: white; font-weight: 600; cursor: pointer;">Вернуться</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        
        // Сразу на весь экран
        tg.expand();
        tg.disableVerticalSwipes();
        
        // Показываем нативную кнопку "Назад" Telegram
        tg.BackButton.show();
        
        // Говорим, что приложение готово
        tg.ready();

        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('id');
        
        const gameFrame = document.getElementById('gameFrame');
        const loader = document.getElementById('loader');
        const errorOverlay = document.getElementById('errorOverlay');

        let currentGame = null;

        if (!gameId) {
            window.location.href = 'index.html';
        }

        // Загрузка данных игры
        async function loadGameData() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/vibeapp64/vibeapp64.github.io/refs/heads/main/apps/games.json');
                const games = await response.json();
                const game = games.find(g => g.id == gameId);
                
                if (!game) throw new Error('Игра не найдена');
                
                currentGame = game;
                
                // Устанавливаем класс для правильной ориентации
                if (game.orientation === 'landscape') {
                    gameFrame.classList.add('landscape');
                } else {
                    gameFrame.classList.remove('landscape');
                }
                
                // Загружаем игру в iframe
                gameFrame.src = game.gameUrl;
                
                // Скрываем лоадер через 1.5 секунды или при загрузке iframe
                setTimeout(() => {
                    if (loader) loader.style.display = 'none';
                }, 1500);
                
            } catch (error) {
                console.error('Ошибка:', error);
                if (loader) loader.style.display = 'none';
                if (errorOverlay) errorOverlay.style.display = 'flex';
                tg.HapticFeedback.notificationOccurred('error');
            }
        }

        // Обработчик нативной кнопки "Назад"
        tg.BackButton.onClick(() => {
            tg.HapticFeedback.impactOccurred('light');
            window.location.href = `game.html?id=${gameId}`;
        });

        // Когда iframe загрузился
        gameFrame.onload = () => {
            if (loader) loader.style.display = 'none';
            tg.HapticFeedback.notificationOccurred('success');
            
            // Дополнительно пробуем развернуть на весь экран
            tg.expand();
        };

        gameFrame.onerror = () => {
            if (loader) loader.style.display = 'none';
            if (errorOverlay) errorOverlay.style.display = 'flex';
            tg.HapticFeedback.notificationOccurred('error');
        };

        // Функция для возврата (используется в кнопке ошибки)
        window.goBack = () => {
            tg.HapticFeedback.impactOccurred('light');
            window.location.href = `game.html?id=${gameId}`;
        };

        // Применяем тему
        function applyTheme() {
            const style = document.documentElement.style;
            style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#1a1a1a');
            style.setProperty('--tg-theme-button-color', tg.themeParams.button_color || '#40a7e3');
            style.setProperty('--tg-theme-button-text-color', tg.themeParams.button_text_color || '#ffffff');
            style.setProperty('--tg-theme-secondary-bg-color', tg.themeParams.secondary_bg_color || '#222222');
            style.setProperty('--tg-theme-hint-color', tg.themeParams.hint_color || '#999999');
        }

        // Старт
        applyTheme();
        tg.onEvent('themeChanged', applyTheme);
        loadGameData();
        
        // Если пользователь нажмет физическую кнопку назад на Android — тоже обработаем
        window.addEventListener('popstate', () => {
            window.location.href = `game.html?id=${gameId}`;
        });
    </script>
</body>
</html>
