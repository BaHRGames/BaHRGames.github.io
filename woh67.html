                quizStep++;
                nextChallenge();
            } else alert("Нужно кликнуть по двум разным рекламным блокам!");
        });
    }
    
    function renderTimerWait(chal) {
        let secondsLeft = chal.seconds;
        let html = `<div class="quiz-block"><h3>${chal.name}</h3>
                    <div id="timerDisplay" style="font-size:48px; text-align:center;">${secondsLeft}</div>
                    <div class="warning-text">⏳ Не закрывайте страницу, идет проверка...</div>
                    <div class="banner" data-link="${randAd()}" style="background:#dd9944;">🔔 Пока идет таймер, посмотрите выгодное предложение! 🔔</div>
                    <button id="timerNextBtn" disabled>ОЖИДАНИЕ...</button></div>`;
        container.innerHTML = html;
        attachGlobalClicks();
        let timer = secondsLeft;
        const timerSpan = document.getElementById("timerDisplay");
        const btn = document.getElementById("timerNextBtn");
        const interval = setInterval(() => {
            timer--;
            if(timerSpan) timerSpan.innerText = timer;
            if(timer <= 0) {
                clearInterval(interval);
                if(btn) { btn.disabled = false; btn.innerText = "ПРОДОЛЖИТЬ"; }
            }
        }, 1000);
        btn?.addEventListener("click", () => {
            if(timer <= 0) { quizStep++; nextChallenge(); }
            else alert("Дождитесь окончания таймера!");
        });
    }
    
    function renderPoll(chal) {
        let optsHtml = '';
        chal.options.forEach(opt => { optsHtml += `<label style="display:block; margin:8px;"><input type="radio" name="poll" value="${opt}"> ${opt}</label>`; });
        let html = `<div class="quiz-block"><h3>${chal.name}</h3>${optsHtml}<button id="submitPoll">ГОЛОСОВАТЬ</button>
                    ${renderAdsBlock(2)}<div class="inline-ad" data-link="${randAd()}">🍇 Узнайте правильный ответ, нажав на рекламу! 🍇</div></div>`;
        container.innerHTML = html;
        attachGlobalClicks();
        document.getElementById("submitPoll")?.addEventListener("click", () => {
            let selected = document.querySelector('input[name="poll"]:checked');
            if(selected && selected.value === chal.correct) { quizStep++; nextChallenge(); }
            else { alert("❌ Неправильный ответ! Ёжики обожают ежевику! Попробуйте ещё раз."); }
        });
    }
    
    function renderMathCaptcha(chal) {
        let html = `<div class="quiz-block"><h3>${chal.name}</h3>
                    <input type="text" id="mathAnswer" style="width:100%; padding:8px; margin:8px 0;" placeholder="Введите число">
                    <button id="submitMath">ОТВЕТИТЬ</button>${renderAdsBlock(2)}</div>`;
        container.innerHTML = html;
        attachGlobalClicks();
        document.getElementById("submitMath")?.addEventListener("click", () => {
            let val = document.getElementById("mathAnswer")?.value.trim();
            if(val === chal.answer) { quizStep++; nextChallenge(); }
            else { alert("❌ Неправильный ответ! Внимательнее, это защита от ботов."); }
        });
    }
    
    function finalRedirect() {
        removeFloatingAds();
        currentScene = "FINAL";
        container.innerHTML = `
            ${renderAdsBlock(1)}
            <div style="background:#5f8b4c; padding:20px; text-align:center; border:5px ridge #ffcc77; margin:12px 0;">
                <h2 style="color:#ffefb0;">✅ ВЕРИФИКАЦИЯ ПРОЙДЕНА ✅</h2>
                <p>Ваша уникальная ссылка на скачивание World Of Hedgehogs готова!</p>
                <div class="btn-down" id="finalDownloadBtn" style="background:#b33e2e;">📀 ПОЛУЧИТЬ ИГРУ 📀</div>
                <div class="warning-text">🔒 Файл защищен паролем: hedgehog2026</div>
            </div>
            <div class="inline-ad" data-link="https://t.me/+npT0q5BpbnQ4MTFi">🎁 Подпишись на канал, чтобы не потерять доступ к игре! 🎁</div>
        `;
        attachGlobalClicks();
        document.getElementById("finalDownloadBtn")?.addEventListener("click", () => {
            window.open(FINAL_LINK, "_blank");
        });
        showToastAd();
    }
    
    renderStart();
    setInterval(() => { if(Math.random() > 0.7 && currentScene !== "FINAL") showFloatingAd(0, 10); }, 25000);
    setInterval(() => { if(Math.random() > 0.8 && currentScene !== "FINAL") showToastAd(); }, 18000);
</script>
</body>
</html>
